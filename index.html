// ─── АННОТИРОВАННЫЙ ГРАФИК ────────────────────────────────────────────────────
function BigChart({inc,isLegal,expR,r6,r15,pc,ndsMode}){
  const C=useC();
  const[tip,setTip]=useState(null);
  const[thTip,setThTip]=useState(null);
  const svgRef=useRef(null);
  const VW=480,VH=300,P={l:30,r:8,t:12,b:36};
  const CW=VW-P.l-P.r,CH=VH-P.t-P.b-16,YM=32;

  const series=CHART_S.map(s=>{
    const pts=[];
    for(let i=0;i<=STP;i++){
      const t=i/STP,iv=Math.pow(10,LMN+t*(LMX-LMN));
      pts.push(s.calc(iv,isLegal,expR,r6,r15,pc,ndsMode));
    }
    return{...s,pts};
  });

  function sxy(t,v){return{x:P.l+t*CW,y:P.t+CH-(v/YM)*CH};}
  function cy(y){return Math.max(P.t,Math.min(P.t+CH,y));}
  function path(pts){let d="";pts.forEach((v,i)=>{if(v===null)return;const{x,y}=sxy(i/STP,v);d+=(i===0||pts[i-1]===null?"M":"L")+`${x.toFixed(1)},${cy(y).toFixed(1)} `;});return d;}

  function onPt(e){
    const s=svgRef.current;if(!s)return;
    const rect=s.getBoundingClientRect();
    const px=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const svgX=px/rect.width*VW,t=Math.max(0,Math.min(1,(svgX-P.l)/CW));
    if(svgX<P.l||svgX>VW-P.r){setTip(null);return;}
    const idx=Math.round(t*STP),iv=Math.pow(10,LMN+t*(LMX-LMN));
    setTip({x:P.l+t*CW,t,iv,vals:series.map(s=>({key:s.key,color:s.color,val:s.pts[Math.min(idx,STP)]}))});
  }
  const cx=P.l+lgT(inc)*CW;

  return(
    <div style={{position:"relative",userSelect:"none"}}>
      <svg ref={svgRef} viewBox={`0 0 ${VW} ${VH}`} style={{width:"100%",display:"block",cursor:"crosshair"}} onMouseMove={onPt} onMouseLeave={()=>setTip(null)} onTouchMove={e=>{e.preventDefault();onPt(e);}} onTouchEnd={()=>setTip(null)}>
        <rect x={P.l} y={P.t} width={CW} height={CH} fill={C.bg} rx={2}/>
        {[5,10,15,20,25,30].map(p=>{const y=P.t+CH-(p/YM)*CH;return(<g key={p}><line x1={P.l} y1={y} x2={VW-P.r} y2={y} stroke={C.border} strokeWidth="0.6"/><text x={P.l-2} y={y+1.5} textAnchor="end" fontSize="6.5" fill={C.muted} fontFamily={FB}>{p}%</text></g>);})}
        {XTICKS.map(v=>{const t=lgT(v),x=P.l+t*CW,lb=v>=1e6?(v/1e6)+"М":(v/1e3)+"К";return(<g key={v}><line x1={x} y1={P.t+CH} x2={x} y2={P.t+CH+2.5} stroke={C.border} strokeWidth="0.6"/><text x={x} y={P.t+CH+10} textAnchor="middle" fontSize="6" fill={C.muted} fontFamily={FB}>{lb}</text></g>);})}
        <rect x={P.l} y={P.t} width={CW} height={CH} fill="none" stroke={C.border} strokeWidth="0.6"/>
        {getThresholds().map(th=>{const t=lgT(th.inc),x=P.l+t*CW;if(x<P.l+5||x>VW-P.r-5)return null;const act=thTip&&thTip.inc===th.inc;return(<g key={th.inc} onClick={e=>{e.stopPropagation();setThTip(act?null:th);setTip(null);}} style={{cursor:"pointer"}}><line x1={x} y1={P.t} x2={x} y2={P.t+CH} stroke={th.color} strokeWidth={act?2:0.8} strokeDasharray="3,3" opacity={act?1:0.55}/><rect x={x-0.4} y={P.t} width={0.8} height={6} fill={th.color} opacity="0.8"/><rect x={x} y={P.t} width={34} height={11} fill={th.color} opacity={act?0.35:0.15} rx="1"/><text x={x+2} y={P.t+7.5} fontSize="5.5" fill={th.color} fontFamily={FB} fontWeight="bold">{th.tip}</text>{act&&<rect x={x-6} y={P.t} width={44} height={CH} fill={th.color} opacity="0.05"/>}</g>);})}
        {series.map(s=><path key={s.key} d={path(s.pts)} fill="none" stroke={s.color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>)}
        <line x1={cx} y1={P.t} x2={cx} y2={P.t+CH} stroke={C.text} strokeWidth="1.2" strokeDasharray="4,3" opacity="0.5"/>
        <rect x={cx-14} y={P.t+CH+12} width={28} height={10} fill={C.dark} rx="2" opacity="0.8"/>
        <text x={cx} y={P.t+CH+19} textAnchor="middle" fontSize="5.5" fill="#fff" fontFamily={FB}>{fmtS(inc)}</text>
        {tip&&(<><line x1={tip.x} y1={P.t} x2={tip.x} y2={P.t+CH} stroke={C.text} strokeWidth="0.8" opacity="0.6"/>{tip.vals.map(v=>{if(v.val===null)return null;const{x,y}=sxy(tip.t,v.val);return<circle key={v.key} cx={x} cy={cy(y)} r="2.8" fill={v.color} stroke={C.bg} strokeWidth="1"/>;})}</>)}
      </svg>
      {tip&&(()=>{const ok=tip.vals.filter(v=>v.val!==null);if(!ok.length)return null;const pct=tip.x/VW;return(
        <div style={{position:"absolute",top:10,left:pct>0.6?"auto":`${Math.round(pct*100+2)}%`,right:pct>0.6?`${Math.round((1-pct)*100+2)}%`:"auto",background:C.dark,borderRadius:6,padding:"9px 13px",minWidth:145,boxShadow:"0 3px 18px rgba(0,0,0,.32)",pointerEvents:"none",zIndex:10}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:"1px",color:"rgba(255,255,255,.4)",textTransform:"uppercase",marginBottom:7}}>{fmtS(tip.iv)}</div>
          {ok.map(v=>(<div key={v.key} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><div style={{width:9,height:9,borderRadius:"50%",background:v.color,flexShrink:0}}/><div style={{fontSize:11,color:"rgba(255,255,255,.65)",flex:1,fontFamily:FB}}>{v.key}</div><div style={{fontSize:12,color:"#fff",fontFamily:FI,letterSpacing:"0.3px"}}>{v.val.toFixed(1)}%</div></div>))}
        </div>
      );})()}
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px 14px",padding:"6px 18px 12px"}}>
        {CHART_S.map(s=>(<div key={s.key} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:18,height:3,background:s.color,borderRadius:2}}/><span style={{fontSize:10,color:C.muted,fontFamily:FB}}>{s.key}</span></div>))}
      </div>
      {thTip&&(
        <div style={{margin:"4px 0 10px",padding:"14px 16px",background:thTip.color+"18",border:"1px solid "+thTip.color+"44",borderLeft:"4px solid "+thTip.color,borderRadius:7,position:"relative"}}>
          <button onClick={()=>setThTip(null)} style={{position:"absolute",top:8,right:10,background:"transparent",border:"none",cursor:"pointer",fontSize:16,color:C.muted,lineHeight:1}}>×</button>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:16}}>{thTip.icon}</span>
            <div style={{fontFamily:FI,fontSize:15,color:thTip.color,letterSpacing:"0.5px"}}>{thTip.label} · {thTip.tip}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <div style={{background:"rgba(255,255,255,.05)",borderRadius:5,padding:"8px 10px"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Что происходит</div>
              <div style={{fontSize:11,color:C.text,lineHeight:1.55}}>{thTip.what}</div>
            </div>
            <div style={{background:"rgba(125,218,138,.08)",borderLeft:"2px solid #7dda8a",borderRadius:5,padding:"8px 10px"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#7dda8a",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Что делать</div>
              <div style={{fontSize:11,color:C.text,lineHeight:1.55}}>{thTip.action}</div>
            </div>
            <div style={{background:"rgba(231,76,60,.08)",borderLeft:"2px solid #e74c3c",borderRadius:5,padding:"8px 10px"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#e74c3c",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Риск бездействия</div>
              <div style={{fontSize:11,color:C.text,lineHeight:1.55}}>{thTip.risk}</div>
            </div>
          </div>
        </div>
      )}
      <div style={{margin:"0 0 14px",padding:"10px 14px",background:C.bg,borderRadius:6,border:"1px solid "+C.border}}>
        <div style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Пороги · нажмите на линию или кнопку для подробностей</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 8px"}}>
          {getThresholds().map(th=>{const act=thTip&&thTip.inc===th.inc;return(
            <button key={th.inc} onClick={()=>setThTip(act?null:th)}
              style={{display:"flex",alignItems:"flex-start",gap:6,background:act?th.color+"18":C.cardBg,border:"1px solid "+(act?th.color+"55":C.border),borderRadius:5,padding:"7px 8px",cursor:"pointer",textAlign:"left",fontFamily:FB,transition:"all 0.15s"}}>
              <div style={{width:10,height:10,borderRadius:2,background:th.color,flexShrink:0,marginTop:2}}/>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:act?th.color:C.text}}>{th.label} — {th.tip}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:1}}>{act?"▼ свернуть":"▶ подробнее"}</div>
              </div>
            </button>
          );})}
        </div>
      </div>
    </div>
  );
}

// ─── КАК ЭТО ПОСЧИТАНО ────────────────────────────────────────────────────────
function HowCalc({best,res,inc,expR}){
  const C=useC();
  const[open,setOpen]=useState(false);
  if(!best||best[0]==="—")return null;
  const key=best[0];
  const r=res[key];
  if(!r||r.unavail)return null;
  const rows=[];
  if(key==="НПД")rows.push(["Доход",fmtS(inc)],["Ставка","4% физлица / 6% компании"],["Налог",fmtS(r.tax)],["Взносы","0 — НПД освобождён"]);
  else if(key==="УСН 6%")rows.push(["Доход",fmtS(inc)],["Налог 6% до вычета",fmtS(Math.round(inc*0.06))],["Вычет взносов ИП","-"+fmtS(r.vznosy||0)],["Налог итого",fmtS(r.tax)],["Взносы ИП",fmtS(r.vznosy||0)]);
  else if(key==="УСН 15%")rows.push(["Доход",fmtS(inc)],["Расходы "+Math.round(expR*100)+"%","-"+fmtS(Math.round(inc*expR))],["База",fmtS(Math.max(0,Math.round(inc*(1-expR))))],["Налог 15%",fmtS(r.tax)],["Взносы ИП",fmtS(r.vznosy||0)]);
  else if(key==="Патент")rows.push(["Патент (год)",fmtS((r.tax||0)+(r.vznosy||0))],["Вычет взносов","-"+fmtS(r.vznosy||0)],["К уплате",fmtS(r.tax||0)],["Взносы ИП",fmtS(r.vznosy||0)]);
  else if(key==="АУСН")rows.push(["Доход",fmtS(inc)],["Налог АУСН",fmtS(r.tax)],["Травматизм",fmtS(r.vznosy||0)]);
  else rows.push(["Налог",fmtS(r.tax)],["Взносы",fmtS(r.vznosy||0)],["Итого нагрузка",fmtS(r.total)]);
  return(
    <div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,.08)"}}>
      <button onClick={()=>setOpen(!open)} style={{background:"none",border:"none",cursor:"pointer",padding:"5px 0",display:"flex",alignItems:"center",gap:6,width:"100%"}}>
        <span style={{fontSize:9,color:"rgba(255,255,255,.3)",letterSpacing:"0.5px",textTransform:"uppercase"}}>Как посчитано</span>
        <span style={{fontSize:9,color:"rgba(255,255,255,.25)",marginLeft:"auto"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{paddingBottom:6}}>
          {rows.map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"rgba(255,255,255,.45)",padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
              <span>{l}</span><span style={{fontFamily:FI,color:"rgba(255,255,255,.75)"}}>{v}</span>
            </div>
          ))}
          <div style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:5,fontStyle:"italic"}}>НК РФ · модель 2026 · без персональных вычетов</div>
        </div>
      )}
    </div>
  );
}


// ─── DEV: CONSISTENCY / STRESS SUITE ───────────────────────────────────────
// Запуск: в консоли браузера -> window.MONETA_DEV.runConsistencySuite({n:1000})
function runConsistencySuite({seed=42,n=800}={}){
  const rnd=(()=>{let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/2**32;};})();
  const pick=(arr)=>arr[Math.floor(rnd()*arr.length)];
  const ndsModes=["none","usn5","usn7"];
  const errors=[];
  const warn=[];
  for(let k=0;k<n;k++){
    const inc=Math.round((rnd()**0.25)*600_000_000); // больше плотности у высоких значений
    const expR=Math.min(0.95,Math.max(0, rnd()*1.05));
    const isLegal=rnd()<0.2;
    const pc=Math.round(rnd()*1_200_000);
    const ndsMode=pick(ndsModes);
    const r6=0.06, r15=0.15;
    const engine=evalCase({inc,expR,isLegal,r6,r15,pc,ndsMode,bizShare:Math.round(rnd()*100),isNewNPD:rnd()<0.3});
    const res=engine.res;
    // Invariants
    const entries=Object.entries(res);
    const valid=entries.filter(([,r])=>!r.unavail);
    if(valid.length){
      const best=valid.reduce((a,b)=>b[1].net>a[1].net?b:a);
      if(best[1].unavail) errors.push({k,inc,expR,isLegal,pc,ndsMode,err:"Best is unavail"});
    }else{
      warn.push({k,inc,expR,isLegal,pc,ndsMode,warn:"No valid regimes"});
    }
    for(const [name,r] of entries){
      if(r.tax<0||r.total<0||r.net>inc+1e-6) errors.push({k,inc,expR,isLegal,pc,ndsMode,reg:name,err:"Bad numeric bounds"});
      if(inc>CFG.usnLimit && (name==="УСН 6%"||name==="УСН 15%") && !r.unavail) errors.push({k,inc,reg:name,err:"USN should be unavail over usnLimit"});
      if(name==="НПД" && inc>CFG.npd.limit && !r.unavail) errors.push({k,inc,reg:name,err:"NPD should be unavail over npd.limit"});
      if(name==="Патент" && inc>CFG.psn.limit && !r.unavail) errors.push({k,inc,reg:name,err:"PSN should be unavail over psn.limit"});
    }

// Cross-layer: NDS on USN threshold should be consistent
if(inc>CFG.ndsThr && ndsMode==="none"){
  // 1) В rulesEngine УСН должна стать недоступной (иначе будут ложные "best")
  if(res["УСН 6%"] && !res["УСН 6%"].unavail) errors.push({k,inc,ndsMode,reg:"УСН 6%",err:"USN6 must be unavail when ndsMode=none above NDS threshold"});
  if(res["УСН 15%"] && !res["УСН 15%"].unavail) errors.push({k,inc,ndsMode,reg:"УСН 15%",err:"USN15 must be unavail when ndsMode=none above NDS threshold"});
  // 2) Подсказки должны сообщать о необходимости выбрать ставку НДС
  const ins=getInsights(inc,expR,isLegal,r6,r15,pc,ndsMode,res).map(x=>x.text).join(" ");
  if(!/НДС/.test(ins)) warn.push({k,inc,ndsMode,warn:"No NDS hint when ndsMode=none above threshold"});
}

  }
  const summary={seed,n,errors:errors.length,warnings:warn.length,examples:{errors:errors.slice(0,10),warnings:warn.slice(0,10)}};
  try{console.log("[MONETA_DEV] Consistency suite summary",summary);}catch(e){}
  return summary;
}

function runRegressionMatrix({cases=REGRESSION_CASES, tol=1e-6, verbose=false}={}){
  const failures=[];
  const passes=[];
  const toSet=(arr)=>new Set((arr||[]).map(String));
  for(const tc of cases){
    try{
      const engine=evalCase(tc.input);
      const res=engine.res||{};
      const exp=tc.expect||{};
      // 1) unavail list
      if(exp.unavail){
        const gotUnavail=new Set(Object.entries(res).filter(([,r])=>r?.unavail).map(([k])=>k));
        const need=toSet(exp.unavail);
        for(const k of need){
          if(!gotUnavail.has(k)){
            failures.push({id:tc.id, kind:"unavail_missing", msg:`Ожидали unavail для '${k}'`, tc, got:[...gotUnavail]});
          }
        }
        // optional: ensure no unexpected unavail when expect.unavail is []
        if(Array.isArray(exp.unavail) && exp.unavail.length===0){
          // allow OSNO/NDFL always avail; check only that core modes not unexpectedly unavail
          // (не делаем жёстко, чтобы не ломать при изменениях правил)
        }
      }
      // 2) best regime
      if(exp.best){
        const gotBest=engine.best?.[0]||"—";
        if(gotBest!==exp.best){
          failures.push({id:tc.id, kind:"best_mismatch", msg:`Ожидали best='${exp.best}', получили '${gotBest}'`, tc, gotBest});
        }
      }
      // 3) warnings (keys)
      if(exp.warnings){
        const gotKeys=new Set((engine.warnings||[]).map(w=>w.key));
        for(const k of exp.warnings){
          if(!gotKeys.has(k)){
            failures.push({id:tc.id, kind:"warning_missing", msg:`Ожидали warning '${k}'`, tc, got:[...gotKeys]});
          }
        }
      }
      // 4) numeric sanity for core regimes
      for(const [name,r] of Object.entries(res)){
        if(!r) continue;
        if(r.tax< -tol || r.total< -tol || r.net > (tc.input.inc||0)+1){
          failures.push({id:tc.id, kind:"numeric_bounds", msg:`Числовые границы нарушены в '${name}'`, tc, reg:name, r});
        }
      }
      if(failures.filter(x=>x.id===tc.id).length===0) passes.push(tc.id);
    }catch(e){
      failures.push({id:tc.id, kind:"exception", msg:String(e), tc});
    }
  }
  const summary={
    total:cases.length,
    passed:passes.length,
    failed:failures.length,
    failures:failures.slice(0,25),
    passedIds: verbose ? passes : undefined,
  };
  try{console.log("[MONETA_DEV] Regression matrix summary",summary);}catch(e){}
  return summary;
}

                  </a>
                  <span style={{fontSize:9,color:C.muted,lineHeight:1.4}}>Точная стоимость по вашему региону и виду деятельности</span>
                </div>
              </div>
            </Card>

            {/* СРАВНЕНИЕ */}
            <Card top={C.dark} style={{marginBottom:14}}>
              <SL color={C.dark}>Все режимы — сравнение</SL>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {DISP.map(({key,color,icon},i)=>{
                  const r=res[key];
                  if(r?.unavail)return(
                    <div key={key} style={{borderRadius:6,border:`1px solid ${C.border}`,borderLeft:`3px solid ${color}`,background:C.cardBg,padding:"10px 14px",opacity:0.45}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:13}}>{icon}</span>
                        <div>
                          <div style={{fontSize:11,fontWeight:700,color:C.muted}}>{key}</div>
                          <div style={{fontSize:9,color:C.muted,marginTop:1}}>🚫 {r.reason}</div>
                        </div>
                      </div>
                    </div>
                  );
                  const iB=key===best[0],bW=r.net/maxNet*100;
                  return(
                    <div key={key} style={{borderRadius:6,border:`1px solid ${iB?color+"55":C.border}`,borderLeft:`3px solid ${color}`,background:iB?color+"0a":C.cardBg,padding:"12px 14px",position:"relative",overflow:"hidden",opacity:ready?1:0,transform:ready?"translateX(0)":"translateX(-12px)",transition:`all 0.3s ease ${i*50}ms`}}>
                      <div style={{position:"absolute",top:0,left:0,bottom:0,width:`${bW}%`,background:color+"0d",transition:"width 0.4s ease"}}/>
                      <div style={{position:"relative",display:"flex",alignItems:"center",gap:10}}>
                        <div style={{minWidth:82}}>
                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <span style={{color,fontSize:10}}>{icon}</span>
                            <span style={{fontFamily:FI,fontSize:14,letterSpacing:"0.5px",color:iB?C.text:C.muted}}>{key}</span>
                            {iB&&<span style={{background:color,color:"#fff",fontSize:7,fontWeight:700,letterSpacing:"0.8px",padding:"1px 5px",borderRadius:2,textTransform:"uppercase"}}>ТОП</span>}
                          </div>
                        </div>
                        <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                          {[{l:"налог",v:r.tax},{l:r.nds>0?"НДС":"взносы",v:r.nds>0?r.nds:r.vznosy},{l:"итого",v:r.total}].map(it=>(
                            <div key={it.l}>
                              <div style={{fontSize:10,color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:1}}>{it.l}</div>
                              <div style={{fontSize:11,color:C.text}}>{fmtS(it.v)}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:10,color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:1}}>на руки</div>
                          <div style={{fontFamily:FI,fontSize:iB?18:15,color:iB?color:C.text}}>{fmtS(r.net)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
                {DISP.filter(d=>res[d.key]?.unavail).length>0&&(
                  <div style={{padding:"8px 12px",background:C.bg,borderRadius:5,border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Недоступны при текущем доходе</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
                      {DISP.filter(d=>res[d.key]?.unavail).map(d=>(<div key={d.key} style={{display:"flex",alignItems:"center",gap:4,background:C.cardBg,border:`1px solid ${C.border}`,borderLeft:`2px solid ${d.color}`,borderRadius:3,padding:"3px 8px"}}><span style={{fontSize:9,color:d.color}}>{d.icon}</span><span style={{fontSize:10,color:C.muted,fontFamily:FI}}>{d.key}</span></div>))}
                    </div>
                    {DISP.filter(d=>res[d.key]?.unavail).map(d=>(<div key={d.key} style={{fontSize:10,color:C.muted,lineHeight:1.4}}>· {res[d.key].reason}</div>))}
                  </div>
                )}
              </div>
            </Card>

            {/* МЕТРИКИ */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
              {[
                {l:"Эфф. ставка",v:valid.length?`${(best[1].total/inc*100).toFixed(1)}%`:"—",c:bG?.color||C.accent},
                {l:"Расходы",v:`${Math.round(expR*100)}%`,c:C.blue},
                {l:"НДС",v:ndsW?(ndsMode==="none"?"Риск":ndsMode==="usn5"?"5%":"7%"):"НЕТ",c:ndsW?(ndsMode==="none"?"#e74c3c":C.accent):"#1E7E34"},
                {l:"Регион",v:region.id==="std"?"Стандарт":"Льготный",c:region.id==="std"?C.muted:"#1E7E34"},
              ].map(s=>(
                <div key={s.l} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderTop:`2px solid ${s.c}`,borderRadius:6,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:7,color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>{s.l}</div>
                  <div style={{fontFamily:FI,fontSize:13,color:s.c}}>{s.v}</div>
                </div>
              ))}
            </div>

            {/* СОВЕТНИК */}
            {insights.length>0&&(
              <div style={{background:C.dark,borderRadius:8,padding:"16px 20px",marginBottom:14}}>
                <div style={{fontFamily:FI,fontSize:15,letterSpacing:"0.8px",color:"#fff",marginBottom:12}}>Советник</div>
                {insights.map((it,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 0",borderBottom:i<insights.length-1?"1px solid rgba(255,255,255,.08)":"none",fontSize:13,color:"rgba(255,255,255,.85)",lineHeight:1.45}}>
                    <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{it.ico}</span>
                    <span dangerouslySetInnerHTML={{__html:iH(it.text,C)}}/>
                  </div>
                ))}
              </div>
            )}

            {/* ГРАФИК — full bleed */}
            <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.blue}`,borderLeft:"none",borderRight:"none",margin:"0 -16px 14px",overflow:"hidden"}}>
              <div style={{padding:"14px 20px 4px",display:"flex",alignItems:"center",gap:6}}>
                <span style={{display:"block",width:3,height:10,background:C.blue,borderRadius:2,flexShrink:0}}/>
                <span style={{fontSize:9,fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",color:C.muted,fontFamily:FB}}>Эффективная ставка от дохода — все режимы</span>
              </div>
              <BigChart inc={inc} isLegal={isLegal} expR={expR} r6={r6} r15={r15} pc={pc} ndsMode={ndsMode}/>
            </div>

            {/* CTA кнопки */}
            {[
              {id:"growth",ico:"📈",title:"Карта роста",sub:"Смоделируйте когда и куда переходить при росте дохода",c:C.accent},
              {id:"ipooo",ico:"⚖",title:"ИП vs ООО — калькулятор",sub:"Сравните чистый доход предпринимателя и учредителя ООО",c:C.blue},
              {id:"glossary",ico:"⊞",title:"НПД, УСН, ПСН, ОСНО, ИП vs ООО",sub:"Справочник всех режимов и форм бизнеса",c:C.muted},
            ].map((btn,i)=>(
              <button key={btn.id} onClick={()=>setTab(btn.id)} style={{width:"100%",background:C.cardBg,border:`1px solid ${C.border}`,borderLeft:`3px solid ${btn.c}`,borderRadius:6,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:FB,color:C.text,marginBottom:i<2?8:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>{btn.ico}</span>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{btn.title}</div>
                    <div style={{fontSize:10,color:C.muted}}>{btn.sub}</div>
                  </div>
                </div>
                <span style={{color:C.muted}}>›</span>
              </button>
            ))}
          </>)}
        </div>

        <footer style={{background:C.dark,borderTop:`3px solid ${C.accent}`,padding:"18px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
            <span style={{color:C.accent,fontSize:12}}>◆</span>
            <span style={{fontFamily:FI,fontSize:16,letterSpacing:2,color:"#fff"}}>МОН<span style={{color:C.accent}}>Е</span>ТА</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,.4)",fontStyle:"italic",fontFamily:"Georgia,serif"}}>by Kuznetsov</span>
            <span style={{color:"rgba(255,255,255,.2)"}}>·</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{CFG.year}</span>
          </div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.2)",letterSpacing:"0.8px",textAlign:"center"}}>НК РФ гл.26.2 · ФЗ-422 · ФЗ-176 · ст.430</div>
        </footer>

        <style>{`
          input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid ${C.accent};cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
          input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid ${C.accent};cursor:pointer}
          select option{font-size:14px;background:${C.cardBg};color:${C.text}}
          *{box-sizing:border-box} button:focus{outline:none}
          ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:${C.muted};border-radius:2px}
          @media print{
            .no-print{display:none!important}
            body{background:#fff!important}
          }
        `}</style>
      </div>
    </ThemeCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(NalogiCalc));

</script>

<!-- MONETA DEV PANEL (prototype) -->
<style>
#monetaDevToggle{position:fixed;right:12px;bottom:12px;z-index:99999;background:#111827;color:#fff;border:1px solid rgba(255,255,255,.2);
  padding:10px 12px;border-radius:999px;font:600 14px/1.1 system-ui,-apple-system,Segoe UI,Roboto,Arial;box-shadow:0 10px 25px rgba(0,0,0,.35)}
#monetaDevPanel{position:fixed;right:12px;bottom:64px;z-index:99999;width:min(560px,calc(100vw - 24px));max-height:min(72vh,720px);
  background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:0 18px 45px rgba(0,0,0,.45);
  display:none;overflow:hidden}
#monetaDevPanel header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
#monetaDevPanel header .title{font:700 14px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial;letter-spacing:.2px}
#monetaDevPanel header .meta{font:500 12px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#9ca3af}
#monetaDevPanel .body{padding:12px;display:flex;flex-direction:column;gap:10px}
#monetaDevPanel .btnRow{display:flex;flex-wrap:wrap;gap:8px}
.monetaDevBtn{background:#111827;color:#e5e7eb;border:1px solid rgba(255,255,255,.18);padding:8px 10px;border-radius:10px;
  font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Arial}
.monetaDevBtn.primary{background:#2563eb;border-color:#2563eb}
.monetaDevBtn.warn{background:#f59e0b;border-color:#f59e0b;color:#111827}
.monetaDevBtn.danger{background:#ef4444;border-color:#ef4444}
#monetaDevOut{width:100%;min-height:240px;resize:vertical;background:#060a12;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;overflow:auto;
  font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;white-space:pre-wrap}
#monetaDevHint{font:500 12px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#9ca3af}
</style>

<button id="monetaDevToggle" type="button">DEV</button>
<section id="monetaDevPanel" aria-label="MONETA Dev Panel">
  <header>
    <div>
      <div class="title">MONETA · Dev тесты</div>
      <div class="meta">Regression + Stress + Consistency</div>
    </div>
    <button class="monetaDevBtn danger" id="monetaDevClose" type="button">Закрыть</button>
  </header>
  <div class="body">
    <div class="btnRow">
      <button class="monetaDevBtn primary" id="monetaDevReg" type="button">Regression Matrix</button>
      <button class="monetaDevBtn" id="monetaDevStress5" type="button">Stress 5 000</button>
      <button class="monetaDevBtn" id="monetaDevStress20" type="button">Stress 20 000</button>
      <button class="monetaDevBtn warn" id="monetaDevCopy" type="button">Скопировать отчёт</button>
      <button class="monetaDevBtn" id="monetaDevDownload" type="button">Скачать JSON</button>
      <button class="monetaDevBtn" id="monetaDevClear" type="button">Очистить</button>
    </div>
    <div id="monetaDevHint">Подсказка: если тесты недоступны — страница ещё не инициализировала <code>window.MONETA_DEV</code>.</div>
    <div id="monetaDevTap" style="font:500 12px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#9ca3af">Тапы: 0</div>
    <textarea id="monetaDevOut" readonly aria-label="Dev report output">Готово. Нажмите Regression Matrix или Stress.</textarea>
  </div>
</section>

<script>
(function(){
  const $ = (id)=>document.getElementById(id);
  let toggleBtn, panel, out, hint;
  let lastReport = null;
  let bound = false;

  function setOut(obj){
    if(!out) return;
    if(typeof obj === "string"){ out.value = obj; return; }
    try{ out.value = JSON.stringify(obj, null, 2); }
    catch(e){ out.value = String(obj); }
  }

  function dev(){ return (window.MONETA_DEV || null); }

  function ensureDev(){
    // Create MONETA_DEV early to avoid race / partial loads on Android content://
    try{
      window.MONETA_DEV = window.MONETA_DEV || {};
      if(!window.MONETA_DEV.runConsistencySuite && typeof window.runConsistencySuite === 'function') window.MONETA_DEV.runConsistencySuite = window.runConsistencySuite;
      if(!window.MONETA_DEV.runRegressionMatrix && typeof window.runRegressionMatrix === 'function') window.MONETA_DEV.runRegressionMatrix = window.runRegressionMatrix;
      if(!window.MONETA_DEV.REGRESSION_CASES && window.REGRESSION_CASES) window.MONETA_DEV.REGRESSION_CASES = window.REGRESSION_CASES;
    }catch(e){}
    const ok = !!(window.MONETA_DEV && (window.MONETA_DEV.runConsistencySuite || window.MONETA_DEV.runRegressionMatrix));
    if(hint){
      hint.textContent = ok
        ? "MONETA_DEV готов. Нажмите Regression Matrix или Stress."
        : ("MONETA_DEV ещё не готов (скрипты загружаются/ошибка). Попробуйте через 1–2 секунды. " +
           (window.__MONETA_LAST_ERROR ? (" Ошибка: " + (window.__MONETA_LAST_ERROR.message || JSON.stringify(window.__MONETA_LAST_ERROR))) : ""));
    }
    return ok;
  }

  async function run(kind, fn){
    if(!ensureDev()){ setOut("MONETA_DEV не готов. Обновите страницу и откройте DEV ещё раз."); return; }
    try{
      setOut("Запуск…");
      const t0 = (window.performance && performance.now) ? performance.now() : Date.now();
      const res = fn();
      const report = (res && typeof res.then === "function") ? await res : res;
      const t1 = (window.performance && performance.now) ? performance.now() : Date.now();
      lastReport = { kind, ms: Math.round(t1 - t0), report };
      setOut(lastReport);
    }catch(err){
      lastReport = { kind, error: String(err && err.stack ? err.stack : err) };
      setOut(lastReport);
    }
  }

  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text).catch(()=>{});
    }
    try{
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ document.execCommand("copy"); }catch(e){}
      document.body.removeChild(ta);
    }catch(e){}
    return Promise.resolve();
  }

  function bind(){
    // Re-bind safely (Android content:// can delay DOM availability)
    toggleBtn = $("monetaDevToggle");
    panel = $("monetaDevPanel");
    out = $("monetaDevOut");
    hint = $("monetaDevHint");

    if(!toggleBtn || !panel || !out || !hint) return false;

    if(bound) return true;
    bound = true;

    toggleBtn.onclick = ()=>{ panel.style.display = "block"; ensureDev(); };
    const closeBtn = $("monetaDevClose");
    if(closeBtn) closeBtn.onclick = ()=>{ panel.style.display = "none"; };

    const regBtn = $("monetaDevReg");
    if(regBtn) { regBtn.onclick = ()=> run("regression", ()=>dev().runRegressionMatrix({ verbose: true })); regBtn.ontouchstart = (e)=>{ e.preventDefault(); run("regression", ()=>dev().runRegressionMatrix({ verbose: true })); }; }

    const s5 = $("monetaDevStress5");
    if(s5) { s5.onclick = ()=> run("stress_5000", ()=>dev().runConsistencySuite({ n: 5000, seed: 42 })); s5.ontouchstart = (e)=>{ e.preventDefault(); run("stress_5000", ()=>dev().runConsistencySuite({ n: 5000, seed: 42 })); }; }

    const s20 = $("monetaDevStress20");
    if(s20) { s20.onclick = ()=> run("stress_20000", ()=>dev().runConsistencySuite({ n: 20000, seed: 7 })); s20.ontouchstart = (e)=>{ e.preventDefault(); run("stress_20000", ()=>dev().runConsistencySuite({ n: 20000, seed: 7 })); }; }

    const clearBtn = $("monetaDevClear");
    if(clearBtn) clearBtn.onclick = ()=>{ lastReport=null; setOut("Очищено. Нажмите Regression Matrix или Stress."); };

    const copyBtn = $("monetaDevCopy");
    if(copyBtn) copyBtn.onclick = async ()=>{
      if(!lastReport){ setOut("Нечего копировать: сначала запустите тест."); return; }
      const txt = JSON.stringify(lastReport, null, 2);
      try{ await copyText(txt); }catch(e){}
      try{ out.focus(); out.select(); }catch(e){}
      setOut(Object.assign({}, lastReport, {copied: true, note: "Если не скопировалось — удерживайте палец на поле, «Выделить всё» → «Копировать»."}));
    };

    const dlBtn = $("monetaDevDownload");
    if(dlBtn) dlBtn.onclick = ()=>{
      if(!lastReport){ setOut("Нечего скачивать: сначала запустите тест."); return; }
      const txt = JSON.stringify(lastReport, null, 2);
      try{
        const blob = new Blob([txt], {type:"application/json;charset=utf-8"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "moneta-dev-report.json";
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
      }catch(e){
        setOut(Object.assign({}, lastReport, {downloadError: String(e)}));
      }
    };

    // Ensure status text updates even if user opens panel quickly
    ensureDev();

    // tap/click diagnostics (mobile)
    const tapEl = $("monetaDevTap");
    let tapN = 0;
    function bumpTap(){
      tapN++;
      if(tapEl) tapEl.textContent = "Тапы: " + tapN;
    }
    ["click","touchstart"].forEach(evt=>{
      panel.addEventListener(evt, bumpTap, {passive:true});
    });

    return true;
  }

  // Try binding immediately, on DOM ready, and a few retries (Android content:// delays)
  if(!bind()){
    document.addEventListener("DOMContentLoaded", bind, {once:true});
    let tries = 0;
    const timer = setInterval(()=>{
      tries++;
      if(bind() || tries>10) clearInterval(timer);
    }, 300);
  }

  window.addEventListener("load", ()=>{ ensureDev(); });
})();
</script>
