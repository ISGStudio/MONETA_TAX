// ─── КОНФИГ 2026 ─────────────────────────────────────────────────────────────
const CFG_DEFAULT = {
  year:2026,
  npd:  {rateFL:0.04,rateLegal:0.06,limit:2_400_000,vychet:10_000},
  usn6: {vz:57_390,vzExtra:0.01,vzThr:300_000,vzMax:379_208},
  usn15:{minTax:0.01,vz:57_390,vzExtra:0.01,vzThr:300_000,vzMax:379_208},
  psn:  {limit:60_000_000,vz:57_390,vzExtra:0.01,vzThr:300_000,vzMax:379_208},
  ndfl: [{to:2_400_000,r:0.13},{to:5_000_000,r:0.15},{to:20_000_000,r:0.18},{to:50_000_000,r:0.20},{to:Infinity,r:0.22}],
  usnLimit:450_000_000, ndsThr:20_000_000, npdUntil:2028,
  ooo:  {profitTax:0.25, divTaxLow:0.13, divTaxHigh:0.15, divThresh:5_000_000, empContrib:0.302},
  mrot: 22_440,
};

let CFG=CFG_DEFAULT;
function loadRemoteRates(){try{fetch("rates.json").then(r=>r.ok?r.json():null).then(data=>{if(data&&data.year>=CFG_DEFAULT.year){CFG=Object.assign({},CFG_DEFAULT,data);["npd","usn6","usn15","psn","ooo"].forEach(k=>{if(data[k])CFG[k]=Object.assign({},CFG_DEFAULT[k],data[k]);});if(data.ndfl)CFG.ndfl=data.ndfl;}}).catch(()=>{});}catch(e){}}
loadRemoteRates();
function getThresholds(){
  // Важно: значения берём из CFG (могут подгружаться из rates.json), чтобы Карта/подсказки не расходились с расчётами.
  const fmtM=(v)=>{

    const s = (Math.round(mln*10)/10).toString().replace(".",",");
    return `${s} млн`;
  };
  return [
    {inc:CFG.npd.limit,  label:fmtM(CFG.npd.limit),  tip:"Конец НПД",       color:"#1E7E34", icon:"◆",
     what:"НПД перестаёт действовать — статус самозанятого теряется автоматически при превышении лимита.",

    {inc:CFG.ndsThr,  label:fmtM(CFG.ndsThr),  tip:"НДС на УСН",     color:"#E8A020", icon:"⚡",
     what:"При доходе выше порога на УСН в 2026 возникает обязанность начислять НДС по ставке 5% или 7% (без входящих вычетов).",

     risk:"НДС может резко снизить маржу. Ошибка в выборе режима и ставки приводит к доначислениям и пеням."},
    {inc:CFG.psn.limit, label:fmtM(CFG.psn.limit), tip:"Лимит патента",    color:"#2E4170", icon:"■",
     what:"ПСН доступен до лимита выручки. При превышении — патент утрачивается, нужна УСН или ОСНО.",
     action:"Контролируйте лимит заранее. При росте выручки готовьте переход на УСН/ОСНО и структуру бизнеса.",
     risk:"Утрата права на ПСН задним числом может привести к перерасчёту налогов и штрафам."},
    {inc:CFG.usnLimit, label:fmtM(CFG.usnLimit), tip:"Переход на ОСНО",   color:"#e74c3c", icon:"▲",
     what:"При превышении лимита выручки УСН становится недоступной. Остаётся ОСНО.",
     action:"Планируйте структуру заранее. Переход на ОСНО требует полноценного бухучёта.",
     risk:"ОСНО требует отчётности и НДС со всех операций. Без бухгалтера крайне рискованно."},
  ];
}

// ─── РАСЧЁТЫ ─────────────────────────────────────────────────────────────────
function vzIP(inc,cfg=CFG.usn6){
  return Math.min(cfg.vz+(inc>cfg.vzThr?(inc-cfg.vzThr)*cfg.vzExtra:0),cfg.vzMax);
}
function calcNDFLTax(base){
  let tax=0,prev=0;
  for(const b of CFG.ndfl){if(base<=prev)break;tax+=(Math.min(base,b.to)-prev)*b.r;prev=b.to;}
  return tax;
}
function calcNPD(inc,legal){
  const rate=legal?CFG.npd.rateLegal:CFG.npd.rateFL;
  if(inc>CFG.npd.limit)return{unavail:true,reason:"Превышен лимит НПД 2,4 млн ₽/год"};
  const tax=Math.max(0,inc*rate-CFG.npd.vychet);
  return{tax,vznosy:0,total:tax,net:inc-tax};
}
function calcUSN6(inc,r6,ndsMode="none"){
  if(inc>CFG.usnLimit)return{unavail:true,reason:"Превышен лимит УСН 450 млн ₽/год → ОСНО"};
  const vz=vzIP(inc,CFG.usn6);
  const tax=Math.max(0,inc*r6-vz);
  const nds=inc>CFG.ndsThr&&ndsMode!=="none"?inc*(ndsMode==="usn5"?0.05:0.07):0;
  return{tax,vznosy:vz,nds,total:tax+vz+nds,net:inc-tax-vz-nds};
}
function calcUSN15(inc,expR,r15,ndsMode="none"){
  if(inc>CFG.usnLimit)return{unavail:true,reason:"Превышен лимит УСН 450 млн ₽/год → ОСНО"};
  const vz=vzIP(inc,CFG.usn15);
  const base=Math.max(0,inc-inc*expR-vz);
  const tax=Math.max(base*r15,inc*CFG.usn15.minTax);
  const nds=inc>CFG.ndsThr&&ndsMode!=="none"?inc*(ndsMode==="usn5"?0.05:0.07):0;
  return{tax,vznosy:vz,nds,total:tax+vz+nds,net:inc-tax-vz-nds};
}
function calcPSN(inc,pc){
  if(inc>CFG.psn.limit)return{unavail:true,reason:"Превышен лимит ПСН 60 млн ₽/год"};
  const vz=vzIP(inc,CFG.psn);
  // ст.346.51 НК РФ: ИП без сотрудников уменьшает патент на 100% взносов
  const taxReduced=Math.max(0,pc-vz);  // патент после вычета взносов
  const vzRemain=Math.max(0,vz-pc);    // остаток взносов сверх патента
  return{tax:taxReduced,vznosy:vz,nds:0,total:taxReduced+vzRemain,net:inc-taxReduced-vzRemain,psnNote:vz>=pc?"Взносы покрыли весь патент":""};
}
function calcNDFL(inc){
  const tax=calcNDFLTax(inc);
  return{tax,vznosy:0,nds:0,total:tax,net:inc-tax};
}
function calcOSNO(inc,expR){
  // ИП на ОСНО: НДС (разница вход/выход) + НДФЛ профессиональный
  const vz=vzIP(inc);
  const expenses=inc*expR;
  // НДС к уплате: с маржи (выручка - расходы) × 20%
  const nds=Math.max(0,inc-expenses)*0.20;
  // НДФЛ база: доходы − расходы − взносы (профессиональный вычет)
  const ndflBase=Math.max(0,inc-expenses-vz);
  const ndfl=calcNDFLTax(ndflBase);
  const total=ndfl+nds+vz;
  return{tax:ndfl,vznosy:vz,nds,total,net:inc-total,isOsno:true};
}
// АвтоУСН — ФЗ №17-ФЗ от 25.02.2022, эксперимент до 31.12.2027
// С 01.01.2026 действует по всей России. Ставки: 8% (доходы) / 20% (доходы−расходы)
// Ключевой плюс: нулевые страховые взносы ИП, нет деклараций, налог считает ФНС
function calcAUSN(inc,expR){
  const LIMIT=60_000_000;
  if(inc>LIMIT)return{unavail:true,reason:"Превышен лимит АУСН 60 млн ₽/год"};
  // Выбираем выгодный объект: 8% с дохода vs 20% с прибыли (мин. 3% от дохода)
  const tax8=inc*0.08;
  const profit=Math.max(0,inc-inc*expR);
  const tax20=Math.max(profit*0.20, inc*0.03);
  const bestTax=Math.min(tax8,tax20);
  const obj=bestTax===tax8?"Доходы 8%":"Доходы−Расходы 20%";
  // Взносы: только травматизм 2970 ₽/год, ОПС/ОМС = 0
  const vznosy=2_970;
  const total=bestTax+vznosy;
  return{tax:bestTax,vznosy,total,net:inc-total,obj,isAUSN:true};
}
function buildResults(inc,isLegal,expR,r6,r15,pc,ndsMode="none"){
  return{
    "НПД":   calcNPD(inc,isLegal),
    "УСН 6%":calcUSN6(inc,r6,ndsMode),
    "УСН 15%":calcUSN15(inc,expR,r15,ndsMode),
    "Патент":calcPSN(inc,pc),
    "АУСН":  calcAUSN(inc,expR),
    "НДФЛ":  calcNDFL(inc),
    "ОСНО":  calcOSNO(inc,expR),
  };
}


// ─── RULES ENGINE (единый слой правил) ─────────────────────────────────────
// Один источник истины для: расчётов, доступности режимов, предупреждений, порогов.
// На первом этапе: используем существующие calc* и добавляем "склейку" правил.
function evalCase(inputs){
  const {
    inc, expR, isLegal, r6, r15, pc,
    ndsMode="none", bizShare=0, isNewNPD=false,
  } = inputs;

  // 1) Базовые расчёты
  const res = buildResults(inc, isLegal, expR, r6, r15, pc, ndsMode);

  // 2) Смешанный НПД для самозанятого: часть дохода от юрлиц (6%), часть от физлиц (4%)
  if(!isLegal && res["НПД"] && !res["НПД"].unavail){
    const mixRate = (bizShare/100)*CFG.npd.rateLegal + ((100-bizShare)/100)*CFG.npd.rateFL;
    const vychet = isNewNPD ? CFG.npd.vychet : 0;
    const tax = Math.max(0, inc*mixRate - vychet);
    res["НПД"] = { ...res["НПД"], tax, total: tax, net: inc - tax, mixRate, vychet };
  }

  // 3) НДС на УСН (2026): если доход выше порога и ставка НДС не выбрана, УСН считаем недоступной.
  // Это предотвращает ложные рекомендации и повышает "максимальную точность".
  const warnings = [];
  if(inc > CFG.ndsThr && ndsMode === "none"){
    ["УСН 6%","УСН 15%"].forEach(k=>{
      if(res[k] && !res[k].unavail){
        res[k] = { ...res[k], unavail:true, reason:"Доход выше порога НДС: выберите 5%/7% для УСН или рассмотрите ОСНО/АУСН" };
      }
    });
    warnings.push({
      key:"nds_on_usn",
      urgent:true,
      text:"Доход выше порога — для УСН в 2026 нужно выбрать НДС 5% или 7% (без входящих вычетов). Пока не выбрано — УСН исключена из рекомендаций."
    });
  }

  // 4) Пороги (Карта) — строго из CFG
  const thresholds = getThresholds();

  // 5) Best/Worst + saving
  const entries = Object.entries(res);
  const valid = entries.filter(([,r])=>!r.unavail);
  const best = valid.length ? valid.reduce((a,b)=>b[1].net>a[1].net?b:a) : ["—",{net:0,total:0}];
  const worst = valid.length>1 ? valid.reduce((a,b)=>b[1].net<a[1].net?b:a) : best;
  const ndflNet = res["НДФЛ"]?.net || 0;
  const saving = valid.length>1 ? Math.max(0, best[1].net - ndflNet) : 0;

  return { res, valid, best, worst, ndflNet, saving, warnings, thresholds };
}

// ─── ФОРМАТИРОВАНИЕ ──────────────────────────────────────────────────────────
function fmtS(n){
  if(!n&&n!==0)return"—";
  if(n>=1e9)return(n/1e9).toFixed(1).replace(/\.0$/,"")+" млрд ₽";
  if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,"")+" млн ₽";
  if(n>=1e3)return Math.round(n/1e3)+" тыс ₽";
  return Math.round(n)+" ₽";
}
function fmtN(n){return new Intl.NumberFormat("ru-RU").format(Math.round(n));}
function parseR(s){return parseInt(String(s).replace(/\D/g,""),10)||0;}
function iH(t,C){
  return t
    .replace(/<hi>/g,`<span style="color:${C.insHi};font-weight:700">`)
    .replace(/<\/hi>/g,"</span>")
    .replace(/<good>/g,`<span style="color:${C.insGood};font-weight:700">`)
    .replace(/<\/good>/g,"</span>");
}

// ─── СОВЕТНИК (ТОЛЬКО ПО РАСЧЁТУ) ────────────────────────────────────────────
function getInsights(inc,expR,isLegal,r6,r15,pc,ndsMode,res){
  const items=[];
  const valid=Object.entries(res).filter(([,r])=>!r.unavail);
  if(!valid.length)return items;
  const best=valid.reduce((a,b)=>b[1].net>a[1].net?b:a);
  const worst=valid.reduce((a,b)=>b[1].net<a[1].net?b:a);
  const saving=Math.max(0,best[1].net-worst[1].net);
  const npd=res["НПД"],u6=res["УСН 6%"],u15=res["УСН 15%"],psn=res["Патент"],osno=res["ОСНО"];

  if(npd.unavail&&inc<=CFG.npd.limit*1.5)
    items.push({ico:"🚫",text:`<strong>НПД недоступен</strong> — доход <hi>${fmtS(inc)}</hi> превысил лимит <hi>2,4 млн ₽/год</hi>. Откройте ИП.`});
  else if(!npd.unavail&&inc>CFG.npd.limit*0.85)
    items.push({ico:"⚠️",text:`До лимита НПД остаётся <hi>${fmtS(CFG.npd.limit-inc)}</hi>. Заранее выберите режим для ИП (УСН 6%/15%, Патент) — при превышении статус НПД теряется автоматически, ИП с выбранным режимом нужно иметь заранее.`});

  if(saving>0)
    items.push({ico:"💡",text:`<strong>${best[0]}</strong> выгоднее <strong>${worst[0]}</strong> на <good>${fmtS(saving)}</good>/год — это ${Math.round(saving/inc*100)}% дохода.`});

  // УСН сравнение — ТОЛЬКО по фактическому расчёту, не по порогу 60%
  if(!u6?.unavail&&!u15?.unavail){
    const u15Better=u15.net>u6.net;
    const diff=Math.abs(u6.net-u15.net);
    if(diff>1000){
      if(u15Better)items.push({ico:"📊",text:`По вашим параметрам <strong>УСН 15%</strong> выгоднее УСН 6% на <good>${fmtS(diff)}</good>/год. Сохраняйте все чеки и договоры.`});
      else items.push({ico:"📊",text:`По вашим параметрам <strong>УСН 6%</strong> выгоднее УСН 15% на <good>${fmtS(diff)}</good>/год. Расходы слишком малы для 15%.`});
    }
  }

  if(!psn?.unavail&&!u6?.unavail&&u6.net<psn.net)
    items.push({ico:"📋",text:`Патент выгоднее УСН 6% на <good>${fmtS(psn.net-u6.net)}</good>/год. Стоимость фиксирована — чем выше реальный доход, тем выгоднее.`});

  if(!osno?.unavail&&inc>CFG.usnLimit)
    items.push({ico:"★",text:`Доступен только <strong>ОСНО</strong>: НДС ${fmtS(osno.nds)} + НДФЛ ${fmtS(osno.tax)} + взносы ${fmtS(osno.vznosy)} = <hi>${fmtS(osno.total)}</hi> в год. Нужен бухгалтер.`});

  if(r6<0.06)items.push({ico:"🌍",text:`Льготный регион: ставка УСН 6%→<hi>${(r6*100).toFixed(0)}%</hi>, УСН 15%→<hi>${(r15*100).toFixed(0)}%</hi>. Это существенно меняет итог.`});
  if(inc>CFG.ndsThr&&ndsMode==="none")items.push({ico:"⚠️",text:`Доход выше <hi>20 млн ₽</hi> — на УСН в 2026 году возникает НДС. Выберите ставку: <hi>5%</hi> или <hi>7%</hi> (без входящих вычетов). Расчёт изменится.`});
  if(inc>CFG.ndsThr&&ndsMode!=="none")items.push({ico:"🔶",text:`НДС ${ndsMode==="usn5"?"5%":"7%"} добавлен к расчёту: <hi>${fmtS(inc*(ndsMode==="usn5"?0.05:0.07))}</hi>/год дополнительно к налогу УСН.`});

  if(!u6?.unavail){const s=Math.min(vzIP(inc),inc*r6);if(s>0)items.push({ico:"🔧",text:`Взносы ИП <hi>${fmtS(CFG.usn6.vz)}</hi> уменьшают налог УСН 6% напрямую. При вашем доходе покрывают <good>${fmtS(s)}</good> налога.`});}
  return items;
}

      <span style={{display:"block",width:3,height:10,background:color||C.accent,borderRadius:2,flexShrink:0}}/>

const fmtMlnRUB=(v)=>{const mln=v/1_000_000;const s=(Math.round(mln*10)/10).toString().replace(".",",");return `${s} млн ₽`;};
const QUIZ=[
  {id:"who",  q:"Кто вы сейчас?",icon:"🧑",
   opts:[{l:"Физлицо — хочу легализовать доход",v:"fl"},{l:"Уже ИП — думаю сменить режим",v:"ip"},{l:"Планирую открыть бизнес",v:"new"},{l:"Руководитель / владелец ООО",v:"ooo"}]},
  {id:"emp",  q:"Есть ли сотрудники?",icon:"👥",
   opts:[{l:"Нет, работаю один",v:"0"},{l:"1–5 человек",v:"5"},{l:"6–15 человек",v:"15"},{l:"Больше 15",v:"many"}]},
  {id:"inc",  q:"Годовой доход (примерно)?",icon:"💰",
   opts:[{l:`До ${fmtMlnRUB(CFG.npd.limit)}`,v:"micro"},{l:`${fmtMlnRUB(CFG.npd.limit)}–10 млн ₽`,v:"small"},{l:`10–${fmtMlnRUB(CFG.psn.limit)}`,v:"mid"},{l:`Больше ${fmtMlnRUB(CFG.psn.limit)}`,v:"big"}]},
  {id:"exp",  q:"Доля расходов от выручки?",icon:"📦",
   opts:[{l:"Почти нет расходов",v:"low"},{l:"20–40%",v:"med"},{l:"40–60%",v:"high"},{l:"Больше 60%",v:"xhigh"}]},
  {id:"buh",  q:"Отношение к бухгалтерии?",icon:"📊",
   opts:[{l:"Хочу забыть про налоги",v:"zero"},{l:"Готов вести простой учёт",v:"ok"},{l:"Есть бухгалтер — не проблема",v:"full"}]},
];
const RC2={"НПД":"#1E7E34","УСН 6%":"#E8A020","УСН 15%":"#2E4170","Патент":"#6B3FA0","АУСН":"#0077CC","НДФЛ":"#e74c3c","ОСНО":"#c0392b"};

function quizResult(a){
  const r=[];
  const {who,emp,inc,exp,buh}=a;
  const big=inc==="big",mid=inc==="mid",small=inc==="small"||inc==="micro";
  const noEmp=emp==="0"||emp==="5";
  const highExp=exp==="high"||exp==="xhigh";
  const wantSimple=buh==="zero";

  if(noEmp&&inc==="micro"&&who!=="ooo")
    r.push({k:"НПД",s:10,w:"Идеальный старт: 4% с физлиц, нет взносов, нет деклараций. Только до 2,4 млн/год и без сотрудников."});
  if(noEmp&&(small||mid)&&wantSimple)
    r.push({k:"АУСН",s:9,w:"ФНС считает налог сама по данным банка. Взносы ИП = 0. Нет деклараций. До 60 млн. Эксперимент до 2027."});
  if(emp!=="many"&&!big&&!highExp)
    r.push({k:"УСН 6%",s:wantSimple?7:8,w:"Классика для услуг. 6% с выручки. Взносы уменьшают налог — при малом доходе налог ≈ 0."});
  if(emp!=="many"&&!big&&highExp)
    r.push({k:"УСН 15%",s:8,w:"Выгодна при расходах > 60%. Налог только с прибыли. Нужен учёт документов и подтверждение расходов."});
  if(noEmp&&small&&who!=="ooo"&&buh!=="full")
    r.push({k:"Патент",s:7,w:"Фиксированная сумма не зависит от реального дохода. Выгоден когда реальный доход выше потенциального."});
  if(big||emp==="many"||who==="ooo")
    r.push({k:"ОСНО",s:big?6:4,w:"При доходе > 450 млн — обязательна. Для крупного B2B с НДС-вычетами может быть выгодна."});
  if(!r.length) r.push({k:"УСН 6%",s:6,w:"Универсальный вариант. Уточните цифры на вкладке Расчёт."});
  return r.sort((a,b)=>b.s-a.s);
}

function QuizView({onGoCalc}){
  const C=useC();
  const[step,setStep]=useState(0);
  const[ans,setAns]=useState({});
  const[done,setDone]=useState(false);
  const[showCL,setShowCL]=useState(false);

  function pick(v){
    const na={...ans,[QUIZ[step].id]:v};
    setAns(na);
    if(step<QUIZ.length-1) setStep(step+1);
    else setDone(true);
  }
  function reset(){setStep(0);setAns({});setDone(false);}

  if(done){
    const res=quizResult(ans);
    const best=res[0];
    return(
      <div>
        <div style={{background:RC2[best.k]+"20",border:`2px solid ${RC2[best.k]}44`,borderLeft:`4px solid ${RC2[best.k]}`,borderRadius:8,padding:"18px",marginBottom:14}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>🎯 Рекомендуемый режим</div>
          <div style={{fontFamily:FI,fontSize:30,color:RC2[best.k],letterSpacing:1,marginBottom:8}}>{best.k}</div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{best.w}</div>
        </div>
        {res.slice(1,3).map(r=>(
          <div key={r.k} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderLeft:`3px solid ${RC2[r.k]}`,borderRadius:6,padding:"10px 12px",marginBottom:8}}>
            <div style={{fontFamily:FI,fontSize:13,color:RC2[r.k],marginBottom:3}}>Также подходит: {r.k}</div>
            <div style={{fontSize:10,color:C.muted,lineHeight:1.4}}>{r.w}</div>
          </div>
        ))}
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 14px",marginBottom:14}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Ваши ответы</div>
          {QUIZ.map(s=>{const ch=s.opts.find(o=>o.v===ans[s.id]);return ch?(
            <div key={s.id} style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
              <span style={{color:C.muted}}>{s.q}</span>
              <span style={{color:C.text,fontWeight:600}}>{ch.l}</span>
            </div>
          ):null;})}
        </div>
        {showCL?(
          <div style={{marginBottom:12}}><ChecklistView regKey={best.k} onClose={()=>setShowCL(false)}/></div>
        ):(
          <button onClick={()=>setShowCL(true)} style={{width:"100%",padding:"11px",background:C.cardBg,border:"1px solid "+C.border,borderRadius:6,cursor:"pointer",fontFamily:FB,fontSize:12,color:C.text,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <span>📋</span><span>План первых шагов</span>
          </button>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={()=>{reset();setShowCL(false);}} style={{padding:"11px",background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",fontFamily:FB,fontSize:12,color:C.muted}}>↺ Снова</button>
          <button onClick={onGoCalc} style={{padding:"11px",background:C.accent,border:"none",borderRadius:6,cursor:"pointer",fontFamily:FI,fontSize:12,letterSpacing:"0.5px",color:"#fff"}}>Рассчитать точно →</button>
        </div>
      </div>
    );
  }

  const s=QUIZ[step];
  const pct=Math.round((step+1)/QUIZ.length*100);
  return(
    <div>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:10,color:C.muted}}>Вопрос {step+1} из {QUIZ.length}</span>
          <span style={{fontSize:10,color:C.accent,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{height:3,background:C.border,borderRadius:2}}>
          <div style={{height:"100%",width:pct+"%",background:C.accent,borderRadius:2,transition:"width 0.3s"}}/>
        </div>
      </div>
      <div style={{background:C.dark,borderRadius:8,padding:"22px 18px",marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:30,marginBottom:8}}>{s.icon}</div>
        <div style={{fontFamily:FI,fontSize:16,color:"#fff",letterSpacing:"0.5px",lineHeight:1.4}}>{s.q}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {s.opts.map(o=>(
          <button key={o.v} onClick={()=>pick(o.v)} style={{padding:"14px 16px",background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:7,cursor:"pointer",textAlign:"left",fontFamily:FB,fontSize:13,color:C.text,display:"flex",justifyContent:"space-between",alignItems:"center",transition:"border-color 0.15s"}}>
            <span>{o.l}</span><span style={{color:C.muted,fontSize:18}}>›</span>
          </button>
        ))}
      </div>
      {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:10,background:"transparent",border:"none",cursor:"pointer",fontSize:11,color:C.muted,fontFamily:FB,padding:"4px 0"}}>← Назад</button>}
    </div>
  );
}

function FotView(){
  const C=useC();
  const[net,setNet]=useState(100000);   // зарплата на руки
  const[netV,setNetV]=useState("100 000");
  const[isLp,setIsLp]=useState(false);   // льготный плательщик (IT)
  const[isMsp,setIsMsp]=useState(false);  // субъект МСП (15% с суммы > МРОТ)

  function apN(v){const n=Math.max(0,v);setNet(n);setNetV(fmtN(n));}

  // Сотрудник в штате
  const ndfl=0.13;
  const gross=Math.round(net/(1-ndfl));         // гросс
  const mrotPart=Math.min(gross,CFG.mrot);
  const aboveMrot=Math.max(0,gross-CFG.mrot);
  const contrib=isLp?gross*0.075
    :isMsp?(mrotPart*0.302+aboveMrot*0.15)
    :gross*0.302;
  const totalEmp=gross+contrib;                 // итого стоит компании


  // ИП-управляющий: доп. схема
  const ipMgrCost=totalEmp; // компания платит столько же
  const ipMgrAnn=totalEmp*12; // годовой доход ИП-управляющего
  const ipMgrNet=Math.round(ipMgrAnn*(1-0.06)-Math.min(CFG.usn6.vz+(Math.max(0,ipMgrAnn-CFG.usn6.vzThr)*CFG.usn6.vzExtra),CFG.usn6.vzMax)); // ИП УСН 6%
  // Тот же человек как ИП на УСН 6%
  const ipInc=totalEmp;                         // столько же платит заказчик
  const ipTax=Math.round(ipInc*0.06);
  const ipVzAnn=Math.min(CFG.usn6.vz+Math.max(0,(ipInc*12-CFG.usn6.vzThr)*CFG.usn6.vzExtra),CFG.usn6.vzMax); // взносы годовые
  const ipVz=Math.round(ipVzAnn/12);            // помесячно для корректного сравнения
  const ipNet=ipInc-ipTax-ipVz;

  // Тот же как самозанятый (НПД 6% — юрлицо)
  const npdTax=Math.round(totalEmp*0.06);
  const npdNet=totalEmp-npdTax;

  const empSavingVsIp=ipNet-net;
  const empSavingVsNpd=npdNet-net;

  return(
    <div>
      <div style={{background:C.dark,borderRadius:8,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontFamily:FI,fontSize:13,letterSpacing:"0.8px",color:"rgba(255,255,255,.9)",marginBottom:2}}>🧮 Калькулятор ФОТ</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>Реальная стоимость сотрудника для бизнеса vs ИП/самозанятый</div>
      </div>

      {/* Ввод */}
      <div style={{background:C.cardBg,border:"1px solid "+C.border,borderRadius:8,padding:"14px 16px",marginBottom:14}}>
        <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:6}}>Зарплата на руки, ₽</label>
        <input type="text" inputMode="numeric" value={netV}
          onChange={e=>{const r=e.target.value.replace(/\D/g,"");setNetV(r?new Intl.NumberFormat("ru-RU").format(parseInt(r)):"");}}
          onBlur={e=>apN(parseInt(e.target.value.replace(/\D/g,""))||0)}
          onKeyDown={e=>{if(e.key==="Enter")apN(parseInt(netV.replace(/\D/g,""))||0);}}
          style={{width:"100%",padding:"10px 12px",fontSize:16,fontFamily:FI,border:"1px solid "+C.accent,borderRadius:5,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box",letterSpacing:"0.5px"}}/>
        <div style={{marginTop:10}}>
          <button onClick={()=>setIsLp(!isLp)} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",cursor:"pointer",padding:0,fontFamily:FB}}>
            <div style={{width:16,height:16,borderRadius:3,border:"1px solid "+(isLp?C.blue:C.border),background:isLp?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
              {isLp&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:10,color:C.muted}}>IT-компания / льготные взносы 7.5%</span>
          </button>
          <button onClick={()=>{setIsMsp(!isMsp);if(!isMsp)setIsLp(false);}} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:FB}}>
            <div style={{width:14,height:14,borderRadius:3,border:"1px solid "+(isMsp?C.accent:C.border),background:isMsp?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}><span style={{color:"#fff",fontSize:10,fontWeight:700}}>{isMsp?"✓":""}</span></div>
            <span style={{fontSize:10,color:C.muted}}>Субъект МСП — 15% с суммы выше МРОТ ({fmtS(CFG.mrot)}/мес)</span>
          </button>
        </div>

            {l:"Гросс (начислено)",v:gross,c:C.muted},
            {l:`Взносы ${isLp?"7.5%":"30.2%"} (платит работодатель)`,v:contrib,c:"#e74c3c"},
          ].map(r=>(
            <div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:5,borderBottom:"1px solid "+C.border}}>
              <span style={{fontSize:11,color:C.muted}}>{r.l}</span>
              <span style={{fontSize:12,fontWeight:700,color:r.c}}>{r.v===net?fmtS(r.v):"-"+fmtS(r.v)}</span>
            </div>
          ))}

            <span style={{fontSize:12,fontWeight:700,color:C.text}}>Итого стоит бизнесу</span>
            <span style={{fontFamily:FI,fontSize:18,color:"#e74c3c"}}>{fmtS(totalEmp)}</span>
          </div>
        </div>
      </div>

      {/* ИП vs НПД */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:C.cardBg,border:"1px solid "+C.border,borderLeft:"4px solid #E8A020",borderRadius:8,padding:"12px 14px"}}>

          <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Налог УСН</div>

// ─── БЕЗОПАСНАЯ ДОЛЯ + ОБРАТНЫЙ РАСЧЁТ ──────────────────────────────────────
function BezopView({inc,isLegal,r6,res,best}){
  const C=useC();
  const[wantNet,setWantNet]=useState(100000);
  const[wantV,setWantV]=useState("100 000");
  const[clientType,setClientType]=useState("fl"); // fl | ur

  function apW(v){const n=Math.max(0,v);setWantNet(n);setWantV(fmtN(n));}

  // Безопасная доля откладывания по лучшему режиму
  const bKey=best[0];
  const bRes=best[1];
  const safeRate=bRes&&!bRes.unavail?Math.ceil((bRes.total/Math.max(inc,1))*100+1):null;

  // Генератор счёта — сколько выставить чтобы получить wantNet
  const rates={
    "НПД fl":isLegal?0.06:0.04,
    "НПД ur":0.06,
    "УСН 6%":r6,
    "НДФЛ":0.13,
  };
  const npdRate=clientType==="fl"?0.04:0.06;
  const invoiceNpd=Math.ceil(wantNet/(1-npdRate));
  const invoiceUsn=Math.ceil(wantNet/(1-r6));
  const invoiceNdfl=Math.ceil(wantNet/0.87);

  return(
    <div>
      {/* БЕЗОПАСНАЯ ДОЛЯ */}
      <div style={{background:C.dark,borderRadius:8,padding:"16px 18px",marginBottom:14}}>
        <div style={{fontSize:9,color:"rgba(255,255,255,.4)",fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:6}}>💰 Безопасная доля откладывания</div>
        {safeRate?(
          <>
            <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
              <span style={{fontFamily:FI,fontSize:44,color:"#7dda8a"}}>{safeRate}%</span>
              <span style={{fontSize:12,color:"rgba(255,255,255,.5)"}}>с каждого поступления</span>
            </div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.75)",lineHeight:1.6,marginBottom:10}}>
              Откладывайте <strong style={{color:"#7dda8a"}}>{safeRate}%</strong> с каждой оплаты на отдельный счёт-копилку.
              Этого хватит и на налог <strong>{bKey}</strong>, и на взносы — без кассового разрыва.
              Ежеквартальные авансы по <strong>{fmtS(Math.round(bRes.tax/4))}</strong> — детальный календарь в разделе «Платежи».
            </div>
            <div style={{background:"rgba(255,255,255,.06)",borderRadius:6,padding:"10px 14px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:4}}>Пример: получили 100 000 ₽</div>
              <div style={{fontSize:11,color:"#fff"}}>
                → Отложить: <strong style={{color:"#7dda8a"}}>{fmtS(Math.ceil(100000*safeRate/100))}</strong> на налоговый счёт<br/>
                → Ваши: <strong>{fmtS(100000-Math.ceil(100000*safeRate/100))}</strong>
              </div>
            </div>
          </>
        ):(
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>Введите параметры в Расчёте — рассчитаем вашу долю</div>
        )}
      </div>

      {/* ГЕНЕРАТОР СЧЁТА */}
      <div style={{background:C.cardBg,border:"1px solid "+C.border,borderRadius:8,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>🧾 Сколько выставить в счёте</div>
        <div style={{marginBottom:10}}>
          <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:6}}>Хочу получить на руки, ₽</label>
          <input type="text" inputMode="numeric" value={wantV}
            onChange={e=>{const r=e.target.value.replace(/\D/g,"");setWantV(r?new Intl.NumberFormat("ru-RU").format(parseInt(r)):"");}}
            onBlur={e=>apW(parseInt(e.target.value.replace(/\D/g,""))||0)}
            onKeyDown={e=>{if(e.key==="Enter")apW(parseInt(wantV.replace(/\D/g,""))||0);}}
            style={{width:"100%",padding:"9px 12px",fontSize:14,fontFamily:FI,border:"1px solid "+C.accent,borderRadius:5,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Клиент (для НПД)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,background:C.border,padding:2,borderRadius:5}}>
            {[{l:"Физлицо",v:"fl"},{l:"Юрлицо",v:"ur"}].map(o=>(
              <button key={o.v} onClick={()=>setClientType(o.v)} style={{padding:"6px 0",background:clientType===o.v?C.dark:"transparent",border:"none",color:clientType===o.v?"#fff":C.muted,fontSize:11,fontFamily:FB,cursor:"pointer",borderRadius:3,fontWeight:clientType===o.v?700:400,transition:"all 0.15s"}}>{o.l}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            {regime:"НПД "+(clientType==="fl"?"4%":"6%"),invoice:invoiceNpd,color:"#1E7E34"},
            {regime:"УСН "+Math.round(r6*100)+"%",invoice:invoiceUsn,color:"#E8A020"},
            {regime:"НДФЛ 13%",invoice:invoiceNdfl,color:"#e74c3c"},
          ].map(row=>(
            <div key={row.regime} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.bg,borderRadius:6,border:"1px solid "+C.border}}>
              <div>
                <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{row.regime}</div>
                <div style={{fontSize:9,color:C.muted}}>Выставьте счёт на</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:FI,fontSize:16,color:row.color}}>{fmtS(row.invoice)}</div>
                <div style={{fontSize:9,color:C.muted}}>налог: {fmtS(row.invoice-wantNet)}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ChecklistView({regKey,onClose}){
  const C=useC();
  const steps=CL[regKey]||CL["default"];
  const LS="moneta_cl_"+regKey;
  const[done,setDone]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS)||"[]");}catch{return[];}});
  function tog(id){const nd=done.includes(id)?done.filter(x=>x!==id):[...done,id];setDone(nd);try{localStorage.setItem(LS,JSON.stringify(nd));}catch{}}
  const pct=Math.round(done.length/steps.length*100);
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontFamily:FI,fontSize:13,color:C.text}}>📋 Первые шаги: {regKey}</div>
        {onClose&&<button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:18,color:C.muted,padding:"0 4px",lineHeight:1}}>×</button>}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:10,color:C.muted}}>Выполнено {done.length} из {steps.length}</span>
          <span style={{fontSize:10,color:pct===100?"#1E7E34":C.accent,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{height:4,background:C.border,borderRadius:2}}>
          <div style={{height:"100%",width:pct+"%",background:pct===100?"#1E7E34":C.accent,borderRadius:2,transition:"width 0.3s"}}/>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {steps.map(s=>{const ok=done.includes(s.id);return(
          <button key={s.id} onClick={()=>tog(s.id)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:ok?"rgba(30,126,52,.08)":C.cardBg,border:"1px solid "+(ok?"rgba(30,126,52,.3)":C.border),borderRadius:6,cursor:"pointer",textAlign:"left",fontFamily:FB,transition:"all 0.15s"}}>
            <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(ok?"#1E7E34":C.border),background:ok?"#1E7E34":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all 0.15s"}}>
              {ok&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
            </div>
            <div>
              <div style={{fontSize:12,color:ok?C.muted:C.text,fontWeight:600,textDecoration:ok?"line-through":"none",marginBottom:2}}>{s.t}</div>
              <div style={{fontSize:10,color:C.muted,lineHeight:1.4}}>{s.s}{s.url&&<a href={s.url} target="_blank" rel="noopener noreferrer" style={{marginLeft:6,fontSize:9,color:"#E8A020",textDecoration:"none",borderBottom:"1px solid rgba(232,160,32,.4)"}}>→ открыть</a>}</div>
            </div>
          </button>
        );})}
      </div>
      {pct===100&&<div style={{marginTop:12,padding:"12px 16px",background:"rgba(30,126,52,.12)",border:"2px solid rgba(30,126,52,.3)",borderRadius:8,textAlign:"center"}}><div style={{fontSize:14,marginBottom:4}}>🎉</div><div style={{fontSize:12,fontWeight:700,color:"#1E7E34"}}>Все шаги выполнены!</div></div>}

  );
}

const LIMITS=[
  {key:"НПД",  lim:2_400_000,  color:"#1E7E34",icon:"◆",warn:"Статус самозанятого теряется. Нужен ИП."},
  {key:"АУСН", lim:60_000_000, color:"#0077CC",icon:"⚡",warn:"АУСН закрыта. Переход на УСН."},
  {key:"Патент",lim:60_000_000,color:"#6B3FA0",icon:"◈",warn:"Патент недействителен. Пересчёт налога."},
  {key:"УСН",  lim:450_000_000,color:"#E8A020",icon:"▲",warn:"УСН закрыта. Переход на ОСНО."},
];
const MON=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

function TrackerView(){
  const C=useC();
  const TK="moneta_tracker";
  const[vals,setVals]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(TK)||"{}");return MON.map((_,i)=>d[i]||"");}catch{return MON.map(()=>"");}});
  const[sel,setSel]=useState("НПД");

  function upd(i,v){
    const nv=[...vals];nv[i]=v.replace(/\D/g,"");setVals(nv);
    try{const d={};nv.forEach((x,j)=>{if(x)d[j]=x;});localStorage.setItem(TK,JSON.stringify(d));}catch{}
  }

  const nums=vals.map(v=>parseInt(v)||0);
  const cum=nums.reduce((a,v,i)=>{a.push((a[i-1]||0)+v);return a;},[]);
  const total=cum[11]||0;
  const entered=nums.filter(v=>v>0).length;
  const avg=entered>0?nums.filter(v=>v>0).reduce((a,b)=>a+b,0)/entered:0;
  const lim=LIMITS.find(l=>l.key===sel)||LIMITS[0];
  const pct=Math.min(100,total/lim.lim*100);
  const left=Math.max(0,lim.lim-total);
  const bar=pct>85?"#e74c3c":pct>60?"#E8A020":lim.color;

  let warnM=null;
  if(avg>0&&total<lim.lim){let acc=total;for(let m=entered;m<12;m++){acc+=avg;if(acc>=lim.lim){warnM=m;break;}}}

  return(
    <div>
      <div style={{background:C.dark,borderRadius:8,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontFamily:FI,fontSize:13,letterSpacing:"0.8px",color:"rgba(255,255,255,.9)",marginBottom:2}}>📊 Трекер дохода — {new Date().getFullYear()} год</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>Вводите доход каждый месяц — приложение покажет когда вы приближаетесь к лимиту</div>
      </div>
      <div style={{background:C.cardBg,border:"1px solid "+C.border,borderRadius:8,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:10}}>Доход по месяцам, ₽</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {MON.map((m,i)=>(
            <div key={m}>
              <div style={{fontSize:9,color:C.muted,marginBottom:3}}>{m}</div>
              <input type="text" inputMode="numeric"
                value={vals[i]?new Intl.NumberFormat("ru-RU").format(parseInt(vals[i])||0):""}
                placeholder="0"
                onChange={e=>upd(i,e.target.value.replace(/\D/g,""))}
                style={{width:"100%",padding:"6px 8px",fontSize:11,fontFamily:FB,border:"1px solid "+(vals[i]?lim.color+"88":C.border),borderRadius:4,outline:"none",color:C.text,background:vals[i]?lim.color+"0a":C.bg,boxSizing:"border-box",transition:"all 0.15s"}}
              />
            </div>
          ))}
        </div>
        {total>0&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:C.muted}}>Итого</span><span style={{fontFamily:FI,fontSize:16,color:C.text}}>{fmtS(total)}</span></div>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {LIMITS.map(l=><button key={l.key} onClick={()=>setSel(l.key)} style={{padding:"5px 10px",background:sel===l.key?l.color+"20":C.cardBg,border:"1px solid "+(sel===l.key?l.color:C.border),borderRadius:4,cursor:"pointer",fontFamily:FB,fontSize:10,color:sel===l.key?l.color:C.muted,fontWeight:sel===l.key?700:400,transition:"all 0.15s"}}>{l.icon} {l.key}</button>)}
      </div>
      <div style={{background:C.cardBg,border:"1px solid "+C.border,borderLeft:"4px solid "+bar,borderRadius:8,padding:"16px 18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>Лимит {lim.key}</div><div style={{fontFamily:FI,fontSize:18,color:bar}}>{fmtS(lim.lim)}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:FI,fontSize:24,color:bar}}>{pct.toFixed(1)}%</div><div style={{fontSize:9,color:C.muted}}>исчерпано</div></div>
        </div>
        <div style={{height:12,background:C.border,borderRadius:6,overflow:"hidden",marginBottom:8,position:"relative"}}>
          <div style={{height:"100%",width:pct+"%",background:"linear-gradient(to right,"+lim.color+","+bar+")",borderRadius:6,transition:"width 0.5s ease",position:"relative"}}>
            {pct>8&&<div style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:8,color:"#fff",fontWeight:700}}>{pct.toFixed(0)}%</div>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div style={{background:C.bg,borderRadius:5,padding:"7px 10px"}}><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2}}>Накоплено</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{fmtS(total)}</div></div>
          <div style={{background:C.bg,borderRadius:5,padding:"7px 10px"}}><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2}}>Осталось</div><div style={{fontSize:12,fontWeight:700,color:left>0?"#1E7E34":"#e74c3c"}}>{left>0?fmtS(left):"Лимит превышен"}</div></div>
        </div>
        {avg>0&&entered>0?(
          <div style={{padding:"8px 10px",background:total>=lim.lim?"rgba(231,76,60,.12)":warnM!==null?bar+"15":C.bg,borderRadius:5,border:"1px solid "+(total>=lim.lim?"#e74c3c55":warnM!==null?bar+"44":C.border)}}>
            {total>=lim.lim
              ?<div style={{fontSize:11,color:"#e74c3c",lineHeight:1.55}}>🚨 Лимит <strong>{lim.key}</strong> уже превышен на <strong>{fmtS(total-lim.lim)}</strong>.<br/><span style={{fontSize:10}}>{lim.warn}</span></div>
              :warnM!==null
                ?<div style={{fontSize:11,color:C.text,lineHeight:1.55}}>⚠ При темпе <strong style={{color:bar}}>{fmtS(Math.round(avg))}/мес</strong> лимит исчерпается в <strong style={{color:bar}}>{MON[warnM]}</strong>.<br/><span style={{fontSize:10,color:C.muted}}>{lim.warn}</span></div>
                :<div style={{fontSize:11,color:"#1E7E34"}}>✓ При текущем темпе лимит в этом году не превысите</div>
            }
          </div>
        ):<div style={{textAlign:"center",padding:"8px 0",fontSize:11,color:C.muted}}>Введите доходы по месяцам — увидите прогноз</div>}
      </div>
      <button onClick={()=>{const nv=MON.map(()=>"");setVals(nv);try{localStorage.removeItem(TK);}catch{}}} style={{width:"100%",padding:"8px",background:"transparent",border:"1px solid "+C.border,borderRadius:5,cursor:"pointer",fontFamily:FB,fontSize:10,color:C.muted}}>↺ Сбросить трекер</button>
    </div>
  );
}

            return(
              <g key={n.id} onClick={()=>setSel(isSelected?null:n.id)} style={{cursor:"pointer"}}>
                <circle cx={n.x} cy={n.y} r={r+3} fill={n.color} opacity={isDimmed?0.15:0.15}
                  style={{transition:"all 0.2s",filter:isSelected?"blur(2px)":""}}/>
                <circle cx={n.x} cy={n.y} r={r}
                  fill={isSelected?n.color:C.cardBg}
                  stroke={n.color}
                  strokeWidth={isSelected?2:1.2}
                  opacity={isDimmed?0.4:1}
                  style={{transition:"all 0.2s"}}/>
                <text x={n.x} y={n.y-2} textAnchor="middle" fontSize={fs}
                  fill={isSelected?"#fff":n.color}
                  fontFamily={FI} fontWeight="bold"
                  style={{pointerEvents:"none",transition:"all 0.2s",opacity:isDimmed?0.4:1}}>
                  {n.label.split(" ").map((w,wi)=>(
                    <tspan key={wi} x={n.x} dy={wi===0?0:fs+1}>{w}</tspan>
                  ))}
                </text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* Инфо-панель */}
      {selNode?(
        <div style={{background:selNode.color+"15",border:`2px solid ${selNode.color}44`,borderLeft:`4px solid ${selNode.color}`,borderRadius:8,padding:"14px 16px",transition:"all 0.2s"}}>
          <div style={{fontFamily:FI,fontSize:16,color:selNode.color,letterSpacing:"0.5px",marginBottom:8}}>{selNode.label}</div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{selNode.desc}</div>
        </div>
      ):(
        <div style={{padding:"14px 16px",background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:8,textAlign:"center"}}>
          <div style={{fontSize:12,color:C.muted}}>← Нажмите на узел для подробного описания</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:10}}>
            {[{l:"Нет регистрации",c:"#e74c3c"},{l:"Самозанятый",c:"#1E7E34"},{l:"ИП",c:"#E8A020"},{l:"ООО",c:"#1E7E34"},{l:"АУСН — нет НДС до 60 млн",c:"#0077CC"}].map(b=>(
              <div key={b.l} style={{fontSize:9,background:b.c+"15",border:`1px solid ${b.c}44`,color:b.c,padding:"3px 8px",borderRadius:3,fontWeight:600}}>{b.l}</div>
            ))}
          </div>
        </div>
      )}

      {/* Легенда */}
      <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:"4px 12px"}}>
        {[
          {l:"Физлицо / НДФЛ",c:"#e74c3c"},{l:"НПД / УСН",c:"#1E7E34"},{l:"УСН 6%",c:"#E8A020"},
          {l:"УСН 15%",c:"#2E4170"},{l:"Патент",c:"#6B3FA0"},{l:"АУСН",c:"#0077CC"},{l:"ОСНО",c:"#c0392b"},
        ].map(l=>(
          <div key={l.l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:l.c,flexShrink:0}}/>
            <span style={{fontSize:9,color:C.muted}}>{l.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ИП vs ООО КАЛЬКУЛЯТОР ───────────────────────────────────────────────────
function IpOooView({inc,expR,ipBestKey,ipBestNet}){
  const C=useC();
  const RC={"НПД":"#1E7E34","УСН 6%":"#E8A020","УСН 15%":"#2E4170","Патент":"#6B3FA0","НДФЛ":"#e74c3c"};

  // Режим расчёта
  const[mode,setMode]=useState("forward"); // forward = от дохода, reverse = к сумме на руки
  const[oooTax,setOooTax]=useState("osno"); // osno | usn6 | usn15
  const[withdrawType,setWithdrawType]=useState("mixed"); // div | salary | mixed
  const[salary,setSalary]=useState(150_000);
  const[salaryInp,setSalaryInp]=useState("150 000");
  const[empCount,setEmpCount]=useState(2);  // кол-во сотрудников в ООО
  const[wantNet,setWantNet]=useState(3_000_000);
  const[wantInp,setWantInp]=useState("3 000 000");

  const ann=salary*12;
  const empContr=ann*empCount*CFG.ooo.empContrib; // взносы за всех сотрудников
  const annTotal=ann*empCount;  // ФОТ всех сотрудников

  // ─── Расчёт ООО от дохода (forward) ─────────────────────────────────────────
  function calcOOO(revenue){
    let profitBeforeTax=0;
    let taxStr="";

    if(oooTax==="osno"){
      // ОСНО: налог на прибыль 25%, расходы вычитаются
      const bizExp=revenue*expR;
      const salaryExp=withdrawType==="div"?0:(annTotal+empContr);
      const profit=Math.max(0,revenue-bizExp-salaryExp);
      const profTax=profit*CFG.ooo.profitTax;
      profitBeforeTax=profit-profTax;
      taxStr=`Налог на прибыль 25%: ${fmtS(profTax)}`;
    } else if(oooTax==="usn6"){
      // УСН 6%: 6% с выручки, можно уменьшить на взносы до 50% налога
      const taxRaw=revenue*0.06;
      const salaryExp=withdrawType==="div"?0:(annTotal+empContr);
      const profTax=Math.max(taxRaw*0.5, taxRaw); // упрощение: ООО без сотрудников не уменьшает
      profitBeforeTax=Math.max(0,revenue-profTax-salaryExp);
      taxStr=`УСН 6%: ${fmtS(profTax)}`;
    } else {
      // УСН 15%: (доходы - расходы) * 15%, мин 1%
      const bizExp=revenue*expR;
      const salaryExp=withdrawType==="div"?0:(annTotal+empContr);
      const base=Math.max(0,revenue-bizExp-salaryExp);
      const profTax=Math.max(base*0.15, revenue*0.01);
      profitBeforeTax=Math.max(0,base-profTax);
      taxStr=`УСН 15%: ${fmtS(profTax)}`;
    }

    let salaryNet=0,divNet=0,totalNet=0,divTax=0;

    if(withdrawType==="salary"){
      salaryNet=ann*(1-0.13);
      totalNet=salaryNet;
    } else if(withdrawType==="div"){
      divTax=profitBeforeTax<=CFG.ooo.divThresh
        ?profitBeforeTax*CFG.ooo.divTaxLow
        :CFG.ooo.divThresh*CFG.ooo.divTaxLow+(profitBeforeTax-CFG.ooo.divThresh)*CFG.ooo.divTaxHigh;
      divNet=profitBeforeTax-divTax;
      totalNet=divNet;
    } else {
      // Смешанный: зарплата + дивиденды от остатка
      salaryNet=ann*(1-0.13);
      divTax=profitBeforeTax<=CFG.ooo.divThresh
        ?profitBeforeTax*CFG.ooo.divTaxLow
        :CFG.ooo.divThresh*CFG.ooo.divTaxLow+(profitBeforeTax-CFG.ooo.divThresh)*CFG.ooo.divTaxHigh;
      divNet=profitBeforeTax-divTax;
      totalNet=salaryNet+divNet;
    }
    return{totalNet,salaryNet,divNet,divTax,profitBeforeTax,taxStr};
  }

  // ─── Обратный расчёт: сколько нужно заработать чтобы получить wantNet ────────
  function calcReverseIP(target){
    // ИП лучший режим: итерационный подбор
    // Упрощение: если лучший режим УСН 6%, то приблизительно
    // net = inc - max(0, inc*r6 - vzIP(inc)) - vzIP(inc)
    // Итерируем бинарным поиском
    let lo=target,hi=target*3;
    for(let i=0;i<60;i++){
      const mid=(lo+hi)/2;
      const res=buildResults(mid,false,expR,0.06,0.15,60000);
      const best=Object.entries(res).filter(([,r])=>!r.unavail).reduce((a,b)=>b[1].net>a[1].net?b:a,["—",{net:0}]);
      if(best[1].net<target) lo=mid; else hi=mid;
    }
    return (lo+hi)/2;
  }
  function calcReverseOOO(target){
    let lo=target,hi=target*5;
    for(let i=0;i<60;i++){
      const mid=(lo+hi)/2;
      const r=calcOOO(mid);
      if(r.totalNet<target) lo=mid; else hi=mid;
    }
    return (lo+hi)/2;
  }

  const ooo=calcOOO(inc);
  const diff=ooo.totalNet-ipBestNet;
  const ipBetter=ipBestNet>=ooo.totalNet;

  const revIP=calcReverseIP(wantNet);
  const revOOO=calcReverseOOO(wantNet);

  const OOO_TAX_OPTS=[
    {v:"osno",l:"ОСНО",sub:"налог на прибыль 25%"},    {v:"usn6",l:"УСН 6%",sub:"с выручки"},
    {v:"usn15",l:"УСН 15%",sub:"с прибыли"},
  ];
  const WITHDRAW_OPTS=[
    {v:"div",   l:"Дивиденды",  sub:"только"},
    {v:"salary",l:"Зарплата",   sub:"только"},
    {v:"mixed", l:"Смешанный",  sub:"зп + дивиденды"},
  ];

  return(
    <div>
      {/* Переключатель режима */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
        {[{v:"forward",l:"📊 От дохода",sub:"сколько останется"},{v:"reverse",l:"🎯 К цели",sub:"сколько нужно заработать"}].map(o=>(
          <button key={o.v} onClick={()=>setMode(o.v)} style={{padding:"10px 8px",border:`2px solid ${mode===o.v?C.accent:C.border}`,borderRadius:7,background:mode===o.v?C.accent+"15":C.cardBg,cursor:"pointer",fontFamily:FB,textAlign:"center",transition:"all 0.15s"}}>
            <div style={{fontSize:12,fontWeight:700,color:mode===o.v?C.accentD:C.text}}>{o.l}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:2}}>{o.sub}</div>
          </button>
        ))}
      </div>

      {/* Настройки ООО */}
      <div style={{background:C.cardBg,borderRadius:8,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.blue}`,padding:"14px 16px",marginBottom:14}}>
        <SL color={C.blue}>Параметры ООО</SL>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Налоговый режим ООО</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
            {OOO_TAX_OPTS.map(o=>(
              <button key={o.v} onClick={()=>setOooTax(o.v)} style={{padding:"8px 4px",border:`1px solid ${oooTax===o.v?C.blue:C.border}`,background:oooTax===o.v?C.blue+"22":C.cardBg,borderRadius:5,cursor:"pointer",fontFamily:FB,textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:11,fontWeight:700,color:oooTax===o.v?C.blue:C.text}}>{o.l}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:1}}>{o.sub}</div>
              </button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Способ вывода денег</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
            {WITHDRAW_OPTS.map(o=>(
              <button key={o.v} onClick={()=>setWithdrawType(o.v)} style={{padding:"8px 4px",border:`1px solid ${withdrawType===o.v?C.accent:C.border}`,background:withdrawType===o.v?C.accent+"22":C.cardBg,borderRadius:5,cursor:"pointer",fontFamily:FB,textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:11,fontWeight:700,color:withdrawType===o.v?C.accentD:C.text}}>{o.l}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:1}}>{o.sub}</div>
              </button>
            ))}
          </div>
        </div>

        {withdrawType!=="div"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <label style={{fontSize:11,color:C.muted}}>Зарплата директора в месяц, ₽</label>
              <span style={{fontSize:10,color:C.muted}}>+{fmtS(ann*CFG.ooo.empContrib)}/год взносов</span>
            </div>
            <input type="text" inputMode="numeric" value={salaryInp}
              onChange={e=>{const r=e.target.value.replace(/\D/g,"");setSalaryInp(r?new Intl.NumberFormat("ru-RU").format(parseInt(r)):"");}}
              onBlur={e=>setSalary(Math.max(0,parseR(e.target.value)))}
              onKeyDown={e=>{if(e.key==="Enter")setSalary(Math.max(0,parseR(e.target.value)));}}
              style={{width:"100%",padding:"9px 12px",fontSize:14,fontFamily:FI,border:`1px solid ${C.border}`,borderRadius:5,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box"}}/>
            <div style={{marginTop:10}}>
              <label style={{display:"block",fontSize:10,color:C.muted,marginBottom:6}}>Сотрудников в ООО (кроме директора)</label>
              <div style={{display:"flex",gap:4}}>
                {[0,1,2,3,5,10].map(n=>(
                  <button key={n} onClick={()=>setEmpCount(n)}
                    style={{flex:1,padding:"5px 0",background:empCount===n?C.accent:C.cardBg,border:"1px solid "+(empCount===n?C.accent:C.border),borderRadius:4,fontSize:11,fontFamily:FB,color:empCount===n?"#fff":C.muted,cursor:"pointer"}}>{n}</button>
                ))}
              </div>
              {empCount>0&&<div style={{fontSize:9,color:C.muted,marginTop:3}}>Взносы за сотрудников: ~{fmtS(Math.round(salary*12*empCount*CFG.ooo.empContrib))}/год дополнительно</div>}
            </div>
          </div>
        )}
      </div>

      {mode==="forward"?(
        <>
          {/* Итоговое сравнение */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{background:ipBetter?RC[ipBestKey]+"15":C.cardBg,border:`2px solid ${ipBetter?RC[ipBestKey]||C.accent:C.border}`,borderRadius:8,padding:"14px 12px",textAlign:"center",position:"relative"}}>
              {ipBetter&&<div style={{position:"absolute",top:6,right:6,background:RC[ipBestKey]||C.accent,color:"#fff",fontSize:7,fontWeight:700,padding:"2px 6px",borderRadius:2}}>ВЫГОДНЕЕ</div>}
              <div style={{fontFamily:FI,fontSize:20,letterSpacing:1,color:C.text,marginBottom:2}}>ИП</div>
              <div style={{fontSize:10,color:C.muted,marginBottom:10}}>Режим: <span style={{color:RC[ipBestKey]||C.accent,fontWeight:700}}>{ipBestKey}</span></div>
              <div style={{fontSize:8,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>на руки/год</div>
              <div style={{fontFamily:FI,fontSize:24,color:RC[ipBestKey]||C.accent}}>{fmtS(ipBestNet)}</div>
              <div style={{fontSize:9,color:C.muted,marginTop:6}}>Вывод: свободно в любой момент</div>
            </div>
            <div style={{background:!ipBetter?"#1E7E3415":C.cardBg,border:`2px solid ${!ipBetter?"#1E7E34":C.border}`,borderRadius:8,padding:"14px 12px",textAlign:"center",position:"relative"}}>
              {!ipBetter&&<div style={{position:"absolute",top:6,right:6,background:"#1E7E34",color:"#fff",fontSize:7,fontWeight:700,padding:"2px 6px",borderRadius:2}}>ВЫГОДНЕЕ</div>}
              <div style={{fontFamily:FI,fontSize:20,letterSpacing:1,color:C.text,marginBottom:2}}>ООО</div>
              <div style={{fontSize:10,color:C.muted,marginBottom:10}}>{({"osno":"ОСНО","usn6":"УСН 6%","usn15":"УСН 15%"}[oooTax]||oooTax.toUpperCase())} · {withdrawType==="div"?"дивиденды":withdrawType==="salary"?"зарплата":"зп + дивид."}</div>
              <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>на руки/год</div>
              <div style={{fontFamily:FI,fontSize:24,color:"#1E7E34"}}>{fmtS(ooo.totalNet)}</div>
              <div style={{fontSize:9,color:C.muted,marginTop:6}}>{ooo.taxStr}</div>
            </div>
          </div>

          {/* Разница */}
          <div style={{background:C.dark,borderRadius:8,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,.65)"}}>{ipBetter?"ИП выгоднее ООО на":"ООО выгоднее ИП на"}</span>
            <span style={{fontFamily:FI,fontSize:22,color:"#7dda8a"}}>{fmtS(Math.abs(diff))}/год</span>
          </div>

          {/* Детализация ООО — визуальная цепочка */}
          <SL color={C.blue}>Цепочка выплат ООО</SL>
          <div style={{position:"relative",marginBottom:14}}>
            {(()=>{
              const bizExp=oooTax!=="osno"?inc*expR:inc*expR;
              const salaryCost=withdrawType!=="div"?(ann+ann*CFG.ooo.empContrib):0;
              const taxAmt=oooTax==="osno"
                ?Math.max(0,inc-bizExp-salaryCost)*CFG.ooo.profitTax
                :oooTax==="usn6"?inc*0.06
                :Math.max(0,inc-bizExp-salaryCost)*0.15;
              const rows=[
                {l:"Выручка",v:inc,dir:1,bold:true},
                ...(bizExp>0?[{l:`Расходы бизнеса (${Math.round(expR*100)}%)`,v:bizExp,dir:-1}]:[]),
                ...(salaryCost>0?[{l:`Зарплата директора + взносы 30.2%`,v:salaryCost,dir:-1}]:[]),
                {l:ooo.taxStr,v:taxAmt,dir:-1},
                {l:"Чистая прибыль (к распределению)",v:ooo.profitBeforeTax,dir:1,bold:true,color:C.accent},
                ...(ooo.divTax>0?[{l:"НДФЛ с дивидендов 13/15%",v:ooo.divTax,dir:-1}]:[]),
                ...(ooo.salaryNet>0?[{l:"Зарплата на руки (после НДФЛ)",v:ooo.salaryNet,dir:1,color:"#2E4170"}]:[]),
                ...(ooo.divNet>0?[{l:"Дивиденды на руки",v:ooo.divNet,dir:1,color:"#6B3FA0"}]:[]),
                {l:"ИТОГО на руки",v:ooo.totalNet,dir:1,bold:true,color:"#1E7E34"},
              ];
              return rows.map((row,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:row.bold?C.bg:C.cardBg,borderRadius:5,border:`1px solid ${C.border}`,marginBottom:4,borderLeft:row.bold?`3px solid ${row.color||C.text}`:"1px solid "+C.border}}>
                  <span style={{fontSize:10,color:row.bold?C.text:C.muted,fontWeight:row.bold?700:400,flex:1,paddingRight:8}}>{row.l}</span>
                  <span style={{fontFamily:FI,fontSize:row.bold?14:12,color:row.dir>0?(row.color||C.text):C.red,flexShrink:0}}>
                    {row.dir<0?"−":""}{fmtS(row.v)}
                  </span>
                </div>
              ));
            })()}
          </div>
        </>
      ):(
        <>
          {/* Обратный калькулятор */}
          <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:8,padding:"16px",marginBottom:14}}>
            <SL color={C.accent}>Сколько нужно заработать, чтобы получить...</SL>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <input type="text" inputMode="numeric" value={wantInp}
                onChange={e=>{const r=e.target.value.replace(/\D/g,"");setWantInp(r?new Intl.NumberFormat("ru-RU").format(parseInt(r)):"");}}
                onBlur={e=>setWantNet(Math.max(0,parseR(e.target.value)))}
                onKeyDown={e=>{if(e.key==="Enter")setWantNet(Math.max(0,parseR(e.target.value)));}}
                style={{flex:1,padding:"10px 12px",fontSize:18,fontFamily:FI,border:`2px solid ${C.accent}`,borderRadius:6,outline:"none",color:C.text,background:C.bg}}/>
              <span style={{fontSize:13,color:C.muted,flexShrink:0}}>на руки/год</span>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[
              {l:"ИП",sub:ipBestKey,v:revIP,color:RC[ipBestKey]||C.accent,note:"прямой перевод на карту"},
              {l:"ООО",sub:({"osno":"ОСНО","usn6":"УСН 6%","usn15":"УСН 15%"}[oooTax]||oooTax.toUpperCase())+' · '+withdrawType,v:revOOO,color:"#1E7E34",note:ooo.taxStr},
            ].map(s=>(
              <div key={s.l} style={{background:C.cardBg,border:`2px solid ${s.color}44`,borderRadius:8,padding:"14px 12px",textAlign:"center"}}>
                <div style={{fontFamily:FI,fontSize:18,color:C.text,marginBottom:2}}>{s.l}</div>
                <div style={{fontSize:9,color:C.muted,marginBottom:10}}>{s.sub}</div>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>нужно заработать</div>
                <div style={{fontFamily:FI,fontSize:22,color:s.color}}>{fmtS(s.v)}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:6,lineHeight:1.4}}>{s.note}</div>
                <div style={{marginTop:8,padding:"6px 0",borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:9,color:C.muted}}>Налоговая нагрузка</div>
                  <div style={{fontFamily:FI,fontSize:14,color:s.color}}>{((s.v-wantNet)/s.v*100).toFixed(1)}%</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{background:C.dark,borderRadius:8,padding:"12px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:4}}>Чтобы получить <span style={{color:"#FFD580",fontWeight:700}}>{fmtS(wantNet)}</span> на руки:</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,.8)"}}>
                ИП нужно выставить счётов на <span style={{color:RC[ipBestKey]||C.accent,fontFamily:FI,fontSize:14}}>{fmtS(revIP)}</span>
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.8)"}}>
                ООО нужно заработать <span style={{color:"#7dda8a",fontFamily:FI,fontSize:14}}>{fmtS(revOOO)}</span>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Нефинансовые различия */}
      <SL color={C.muted}>Ключевые нефинансовые различия</SL>

    const txt=[

  const vzFix=CFG.usn6.vz,vzExtra=Math.max(0,(r?.vznosy||0)-vzFix);
  return(
    <div>

          <span style={{fontSize:10,color:C.muted,flex:1}}>Что такое авансовые платежи?</span>
          <span style={{fontSize:9,color:C.muted}}>{showExplain?"▲":"▼"}</span>
        </div>
        {showExplain&&(

          </div>
        )}

      <div style={{background:C.dark,borderRadius:8,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:9,color:"rgba(255,255,255,.4)",fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:10}}>Режим для планировщика</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {valid.map(([key])=>{const gg=GLOSSARY.find(x=>x.key===key);return(<button key={key} onClick={()=>setReg(key)} style={{padding:"6px 12px",border:`1px solid ${reg===key?(gg?.color||C.accent)+"88":"rgba(255,255,255,.15)"}`,borderRadius:4,background:reg===key?(gg?.color||C.accent)+"22":"transparent",color:reg===key?(gg?.color||C.accent):"rgba(255,255,255,.5)",fontSize:11,fontFamily:FI,cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.15s"}}>{key}</button>);})}
        </div>

        📦 Скачать пакет: платежи + план действий
      </button>
      {r&&!r.unavail&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[{l:"Налог",v:r.tax,c:"#e74c3c"},{l:"Взносы ИП",v:r.vznosy,c:C.blue},{l:"На руки",v:r.net,c:g?.color||C.green}].map(s=>(
            <div key={s.l} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderTop:`2px solid ${s.c}`,borderRadius:6,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:7,color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>{s.l}</div>

      {(isNPD||isAUSN)?(
        <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderLeft:`3px solid ${isAUSN?"#0077CC":"#1E7E34"}`,borderRadius:6,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:6}}>
            {isAUSN?"АУСН: налог считает ФНС ежемесячно":"НПД: платится ежемесячно"}

              :"«Мой налог» рассчитывает сумму автоматически — оплачиваете до 25-го следующего месяца."}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:11,color:C.muted}}>Примерно в месяц:</span>
            <span style={{fontFamily:FI,fontSize:18,color:isAUSN?"#0077CC":"#1E7E34"}}>{fmtS(r.tax/12)}</span>
          </div>
        </div>
      ):(
        <>
          <SL color={g?.color||C.accent}>Авансовые платежи по кварталам</SL>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {Qs.map((q,i)=>{
              let amt=0,note="";
              if(isPSN){if(i===0){amt=pc<=6000?pc:Math.round(pc/3);note="1-й платёж: в течение 90 дней";}else if(i===1){amt=pc<=6000?0:pc-Math.round(pc/3);note="2-й платёж: до конца срока";}else note="Патент уже оплачен";}
              else{amt=Math.round(r.tax/4);note=i===3?"Годовой налог с зачётом авансов":"Авансовый платёж";}
              return(

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>

// ─── КАРТА РОСТА ──────────────────────────────────────────────────────────────
function GrowthMap({inc,isLegal,expR,r6,r15,pc}){
  const C=useC();
  const[gType,setGType]=useState("pct");
  const[gPct,setGPct]=useState(30);
  const[gFixed,setGFixed]=useState(500_000);
  const[gInp,setGInp]=useState("500 000");
  const[years,setYears]=useState(5);
  const RC={"НПД":"#1E7E34","УСН 6%":"#E8A020","УСН 15%":"#2E4170","Патент":"#6B3FA0","НДФЛ":"#e74c3c","ОСНО":"#c0392b"};

  function buildTL(){
    const steps=[];
    let cur=inc;
    for(let y=0;y<=years;y++){
      if(y>0) cur=gType==="pct"?cur*(1+gPct/100):cur+gFixed;
      const res=buildResults(cur,isLegal,expR,r6,r15,pc);
      const val=Object.entries(res).filter(([,r])=>!r.unavail);
      if(!val.length)continue;
      const best=val.reduce((a,b)=>b[1].net>a[1].net?b:a);
      const warns=[];
      if(cur>CFG.npd.limit&&(y===0?inc<=CFG.npd.limit:true)) warns.push({text:"Превышен лимит НПД 2.4 млн — нужен ИП",urgent:true});
      if(cur>CFG.ndsThr&&(y===0?inc<=CFG.ndsThr:true)) warns.push({text:"НДС на УСН с 20 млн — выберите ставку 5% или 7%",urgent:true});
      if(cur>60_000_000&&(y===0?inc<=60_000_000:true)) warns.push({text:"Превышен лимит АУСН 60 млн",urgent:false});
      if(cur>CFG.psn.limit&&(y===0?inc<=CFG.psn.limit:true)) warns.push({text:"Превышен лимит Патента 60 млн",urgent:false});
      if(cur>CFG.usnLimit&&(y===0?inc<=CFG.usnLimit:true)) warns.push({text:"Превышен лимит УСН 450 млн — переход на ОСНО",urgent:true});
      if(cur>CFG.psn.limit&&(y===0?inc<=CFG.psn.limit:true)) warns.push({text:"Патент недоступен — переходите на УСН",urgent:false});
      if(cur>CFG.usnLimit) warns.push({text:"УСН недоступна — только ОСНО",urgent:true});
      steps.push({y,inc:cur,best,net:best[1].net,total:best[1].total,warns});
    }
    return steps;
  }
  const tl=buildTL();
  const transitions=[];
  for(let i=1;i<tl.length;i++){if(tl[i].best[0]!==tl[i-1].best[0])transitions.push({y:tl[i].y,from:tl[i-1].best[0],to:tl[i].best[0],inc:tl[i].inc});}
  const netGrowth=(tl[tl.length-1]?.net||0)-(tl[0]?.net||0);

  return(
    <div>
      <div style={{background:C.dark,borderRadius:8,padding:"16px 18px",marginBottom:14}}>
        <SL color={C.accent}>Сценарий роста</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label style={{display:"block",fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:6}}>Тип роста</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,background:"rgba(255,255,255,.1)",padding:2,borderRadius:5}}>
              {[{l:"% в год",v:"pct"},{l:"Фикс. сумма",v:"fixed"}].map(o=>(
                <button key={o.v} onClick={()=>setGType(o.v)} style={{padding:"7px 4px",background:gType===o.v?"rgba(232,160,32,.3)":"transparent",border:`1px solid ${gType===o.v?C.accent+"88":"transparent"}`,color:gType===o.v?C.accent:"rgba(255,255,255,.5)",fontSize:10,fontFamily:FB,cursor:"pointer",borderRadius:3,fontWeight:gType===o.v?700:400}}>{o.l}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:6}}>{gType==="pct"?"Рост в год":"Прирост, ₽"}</label>
            {gType==="pct"?(
              <div>
                <div style={{textAlign:"right",marginBottom:4}}><span style={{fontFamily:FI,fontSize:20,color:C.accent}}>{gPct}%</span></div>
                <input type="range" min="5" max="200" step="5" value={gPct} onChange={e=>setGPct(Number(e.target.value))} style={{width:"100%",height:3,cursor:"pointer",border:"none",outline:"none",WebkitAppearance:"none",appearance:"none",borderRadius:2,background:`linear-gradient(to right,${C.accent} ${(gPct-5)/195*100}%,rgba(255,255,255,.2) ${(gPct-5)/195*100}%)`}}/>
              </div>
            ):(
              <input type="text" inputMode="numeric" value={gInp} onChange={e=>{const r=e.target.value.replace(/\D/g,"");setGInp(r?new Intl.NumberFormat("ru-RU").format(parseInt(r)):"");}} onBlur={e=>setGFixed(parseR(e.target.value))} style={{width:"100%",padding:"8px 10px",fontSize:12,fontFamily:FI,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:5,outline:"none",color:"#fff",boxSizing:"border-box"}}/>
            )}
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>Горизонт</label>
          <span style={{fontFamily:FI,fontSize:16,color:C.accentD}}>{years} лет</span>
        </div>
        <input type="range" min="1" max="10" step="1" value={years} onChange={e=>setYears(Number(e.target.value))} style={{width:"100%",height:3,cursor:"pointer",border:"none",outline:"none",WebkitAppearance:"none",appearance:"none",borderRadius:2,background:`linear-gradient(to right,${C.accentD} ${(years-1)/9*100}%,rgba(255,255,255,.2) ${(years-1)/9*100}%)`}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{l:"Доход сейчас",v:fmtS(tl[0]?.inc||inc),c:C.muted},{l:`Через ${years} лет`,v:fmtS(tl[tl.length-1]?.inc||0),c:C.accent},{l:"Рост на руки",v:(netGrowth>=0?"+":"")+fmtS(netGrowth),c:netGrowth>=0?"#1E7E34":"#e74c3c"}].map(s=>(
          <div key={s.l} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderTop:`2px solid ${s.c}`,borderRadius:6,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:7,color:C.muted,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>{s.l}</div>
            <div style={{fontFamily:FI,fontSize:13,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      {transitions.length>0&&(
        <div style={{background:C.accent+"15",border:`1px solid ${C.accent}44`,borderLeft:`3px solid ${C.accent}`,borderRadius:6,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:C.accentD,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>⚡ Точки смены режима</div>
          {transitions.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:i<transitions.length-1?6:0,fontSize:12}}>
              <span style={{fontFamily:FI,color:C.muted}}>Год {t.y}</span>
              <span style={{fontFamily:FI,color:RC[t.from]||C.muted}}>{t.from}</span>
              <span style={{color:C.muted}}>→</span>
              <span style={{fontFamily:FI,color:RC[t.to]||C.accent}}>{t.to}</span>
              <span style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>{fmtS(t.inc)}/год</span>
            </div>
          ))}
        </div>
      )}
      <SL color={C.blue}>Жизненная карта налогоплательщика</SL>
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",left:44,top:0,bottom:0,width:2,background:C.border,zIndex:0}}/>
        {tl.map((step,i)=>{
